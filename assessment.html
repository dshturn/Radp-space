<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RADP - Assessment</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    nav { background: #1e293b; border-bottom: 1px solid #334155; padding: 10px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .nav-links { display: flex; gap: 16px; flex-wrap: wrap; }
    nav a { color: #94a3b8; font-size: 13px; text-decoration: none; }
    nav a:hover { color: #38bdf8; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-user { font-size: 13px; color: #64748b; }
    .nav-logout { background: #334155; color: #e2e8f0; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .nav-logout:hover { background: #475569; }
    .container { padding: 24px; max-width: 900px; margin: 0 auto; }
    .card { background: #1e293b; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
    .card h2 { color: #38bdf8; font-size: 16px; margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
    input, textarea, select { width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 14px; margin-bottom: 14px; }
    textarea { height: 80px; resize: vertical; }
    .btn-primary { background: #0284c7; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .btn-success { background: #059669; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .btn-danger { background: #dc2626; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .section-label { font-size: 12px; color: #64748b; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .item-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #0f172a; border-radius: 8px; margin-bottom: 8px; flex-wrap: wrap; gap: 8px; }
    .item-info { flex: 1; }
    .item-name { font-size: 14px; font-weight: bold; }
    .item-detail { font-size: 12px; color: #64748b; margin-top: 2px; }
    .checkbox-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: #0f172a; border-radius: 8px; margin-bottom: 8px; cursor: pointer; }
    .checkbox-item input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
    .checkbox-item label { cursor: pointer; font-size: 13px; flex: 1; }
    .badge { padding: 3px 8px; border-radius: 12px; font-size: 11px; }
    .badge.draft { background: #334155; color: #94a3b8; }
    .badge.submitted { background: #1e3a5f; color: #93c5fd; }
    .badge.approved { background: #064e3b; color: #6ee7b7; }
    .empty { color: #475569; text-align: center; padding: 24px; }
    .assessment-card { background: #1e293b; border-radius: 10px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; cursor: pointer; }
    .assessment-card:hover { background: #253347; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab { padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; border: none; background: #1e293b; color: #94a3b8; }
    .tab.active { background: #0284c7; color: white; }
    .view { display: none; }
    .view.active { display: block; }
    .lor-btn { background: #7c3aed; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; }
  </style>
</head>
<body>

<nav>
  <div class="nav-links" id="navLinks"></div>
  <div class="nav-right">
    <span class="nav-user" id="navUser"></span>
    <button class="nav-logout" onclick="logout()">Logout</button>
  </div>
</nav>
<script>
  (function() {
    const user = JSON.parse(localStorage.getItem('radp_user') || '{}');
    document.getElementById('navLinks').innerHTML = `<a href="/contractor.html">📋 Contractor</a><a href="/assessment.html">📄 Assessments</a>`;
    document.getElementById('navUser').textContent = user.email || '';
  })();
</script>

<div class="container">
  <div id="listView" class="view active">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div class="section-label">My Assessments</div>
      <button class="btn-success" onclick="showCreate()">+ New Assessment</button>
    </div>
    <div id="assessmentList"><div class="empty">Loading...</div></div>
  </div>

  <div id="createView" class="view">
    <div class="card">
      <h2>New Assessment</h2>
      <label>SharePoint Request ID</label>
      <input type="text" id="requestId" placeholder="e.g. 176">
      <label>Field / Well</label>
      <input type="text" id="fieldWell" placeholder="e.g. MANIFA/MNIF-123">
      <label>Type of Job</label>
      <select id="typeOfJob">
        <option value="">Select type of job...</option>
      </select>
      <label>Objective</label>
      <textarea id="objective" placeholder="Short summary of the job objective"></textarea>
      <button class="btn-primary" onclick="createAssessment()">Create Assessment</button>
      <button style="margin-left:8px;background:#334155;color:#e2e8f0;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;" onclick="showList()">Cancel</button>
    </div>
  </div>

  <div id="detailView" class="view">
    <div style="margin-bottom:16px;">
      <button style="background:#334155;color:#e2e8f0;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;" onclick="showList()">← Back</button>
    </div>
    <div class="card" id="assessmentInfo"></div>

    <div class="tabs">
      <button class="tab active" onclick="showDetailTab('personnel', this)">Personnel</button>
      <button class="tab" onclick="showDetailTab('equipment', this)">Equipment</button>
    </div>

    <div id="personnelTab">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div class="section-label">Selected Personnel</div>
        <button class="btn-primary" onclick="openPersonnelSelector()">+ Add Personnel</button>
      </div>
      <div id="selectedPersonnel"></div>
    </div>

    <div id="equipmentTab" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div class="section-label">Selected Equipment</div>
        <button class="btn-primary" onclick="openEquipmentSelector()">+ Add Equipment</button>
      </div>
      <div id="selectedEquipment"></div>
    </div>

    <div style="margin-top:24px;">
      <button class="lor-btn" onclick="generateLoR()">📄 Generate LoR</button>
    </div>
  </div>
</div>

<!-- Equipment Selector Modal -->
<div id="equipModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:100;justify-content:center;align-items:center;">
  <div style="background:#1e293b;padding:24px;border-radius:12px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto;">
    <h3 style="color:#38bdf8;margin-bottom:16px;">Select Equipment</h3>
    <div id="equipSelectorList"></div>
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="btn-primary" onclick="addSelectedEquipment()">Add Selected</button>
      <button style="background:#334155;color:#e2e8f0;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;" onclick="closeEquipModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- Personnel Selector Modal -->
<div id="persModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:100;justify-content:center;align-items:center;">
  <div style="background:#1e293b;padding:24px;border-radius:12px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto;">
    <h3 style="color:#38bdf8;margin-bottom:16px;">Select Personnel</h3>
    <div id="persSelectorList"></div>
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="btn-primary" onclick="addSelectedPersonnel()">Add Selected</button>
      <button style="background:#334155;color:#e2e8f0;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;" onclick="closePersModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://fslleuedqlxpjnerruzt.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzbGxldWVkcWx4cGpuZXJydXp0Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDk5MzExOSwiZXhwIjoyMDkwNTY5MTE5fQ.oY_dihwgMimesUsvHSuKNoJEXTb3c7vuqWKzeH2pwg4';

  const token = localStorage.getItem('radp_token');
  const user = JSON.parse(localStorage.getItem('radp_user') || '{}');
  if (!token) window.location.href = '/login.html';

  const headers = { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' };

  let currentAssessmentId = null;

  function logout() {
    localStorage.removeItem('radp_token');
    localStorage.removeItem('radp_user');
    window.location.href = '/login.html';
  }

  function showList() {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('listView').classList.add('active');
    loadAssessments();
  }

  function showCreate() {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('createView').classList.add('active');
    loadServiceLines();
  }

  async function loadServiceLines() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/service_lines?select=name&order=name`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
    });
    const lines = await res.json();
    const sel = document.getElementById('typeOfJob');
    sel.innerHTML = '<option value="">Select type of job...</option>';
    lines.forEach(l => sel.innerHTML += `<option value="${l.name}">${l.name}</option>`);
  }

  function showDetail(id) {
    currentAssessmentId = id;
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('detailView').classList.add('active');
    loadAssessmentDetail(id);
  }

  function showDetailTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('equipmentTab').style.display = tab === 'equipment' ? 'block' : 'none';
    document.getElementById('personnelTab').style.display = tab === 'personnel' ? 'block' : 'none';
  }

  async function loadAssessments() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/assessments?contractor_id=eq.${user.id}&order=created_at.desc`, { headers });
    const assessments = await res.json();
    const list = document.getElementById('assessmentList');
    if (!assessments.length) { list.innerHTML = '<div class="empty">No assessments yet. Create your first one.</div>'; return; }
    list.innerHTML = assessments.map(a => `
      <div class="assessment-card" onclick="showDetail(${a.id})">
        <div>
          <div style="font-size:15px;font-weight:bold;">${a.field_well || 'Untitled'}</div>
          <div style="font-size:12px;color:#64748b;margin-top:4px;">${a.type_of_job || ''} · ${a.date_of_issue || ''}</div>
        </div>
        <span class="badge ${a.status}">${a.status}</span>
      </div>`).join('');
  }

  async function createAssessment() {
    const requestId = document.getElementById('requestId').value;
    const fieldWell = document.getElementById('fieldWell').value;
    const typeOfJob = document.getElementById('typeOfJob').value;
    const objective = document.getElementById('objective').value;
    if (!fieldWell || !typeOfJob) { alert('Please fill Field/Well and Type of Job'); return; }
    const res = await fetch(`${SUPABASE_URL}/rest/v1/assessments`, {
      method: 'POST',
      headers: { ...headers, Prefer: 'return=representation' },
      body: JSON.stringify({ contractor_id: user.id, field_well: fieldWell, type_of_job: typeOfJob, objective, sharepoint_request_id: requestId || null })
    });
    const data = await res.json();
    showDetail(data[0].id);
  }

  async function loadAssessmentDetail(id) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/assessments?id=eq.${id}`, { headers });
    const data = await res.json();
    const a = data[0];
    document.getElementById('assessmentInfo').innerHTML = `
      <h2 style="margin-bottom:12px;">${a.field_well}</h2>
      <div style="font-size:13px;color:#94a3b8;margin-bottom:6px;">Type: ${a.type_of_job}</div>
      <div style="font-size:13px;color:#94a3b8;margin-bottom:6px;">Objective: ${a.objective || '—'}</div>
      <div style="font-size:13px;color:#94a3b8;">Date: ${a.date_of_issue} · Status: <span class="badge ${a.status}">${a.status}</span></div>`;
    loadSelectedEquipment(id);
    loadSelectedPersonnel(id);
  }

  async function loadSelectedEquipment(id) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/assessment_equipment?assessment_id=eq.${id}&select=*,equipment_items(serial_number,model,equipment_template_id,equipment_templates(name))`, { headers });
    const items = await res.json();
    const el = document.getElementById('selectedEquipment');
    if (!items.length) { el.innerHTML = '<div class="empty">No equipment selected</div>'; return; }
    el.innerHTML = items.map(i => `
      <div class="item-row">
        <div class="item-info">
          <div class="item-name">${i.equipment_items?.equipment_templates?.name || i.equipment_items?.model || '—'}</div>
          <div class="item-detail">S/N: ${i.equipment_items?.serial_number || '—'}</div>
        </div>
        <button class="btn-danger" onclick="removeEquipment(${i.id})">Remove</button>
      </div>`).join('');
  }

  async function loadSelectedPersonnel(id) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/assessment_personnel?assessment_id=eq.${id}&select=*,personnel(full_name,position,certificate_number)`, { headers });
    const items = await res.json();
    const el = document.getElementById('selectedPersonnel');
    if (!items.length) { el.innerHTML = '<div class="empty">No personnel selected</div>'; return; }
    el.innerHTML = items.map(i => `
      <div class="item-row">
        <div class="item-info">
          <div class="item-name">${i.personnel?.full_name || '—'}</div>
          <div class="item-detail">${i.personnel?.position || ''} · Cert: ${i.personnel?.certificate_number || '—'}</div>
        </div>
        <button class="btn-danger" onclick="removePersonnel(${i.id})">Remove</button>
      </div>`).join('');
  }

  async function openEquipmentSelector() {
    const [itemsRes, addedRes] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/equipment_items?contractor_id=eq.${user.id}&select=*,equipment_templates(name)`, { headers }),
      fetch(`${SUPABASE_URL}/rest/v1/assessment_equipment?assessment_id=eq.${currentAssessmentId}&select=equipment_item_id`, { headers })
    ]);
    const items = await itemsRes.json();
    const added = await addedRes.json();
    const addedIds = new Set(added.map(a => String(a.equipment_item_id)));
    document.getElementById('equipSelectorList').innerHTML = items.map(i => {
      const isAdded = addedIds.has(String(i.id));
      return `<div class="checkbox-item" style="${isAdded ? 'opacity:0.4;pointer-events:none;' : ''}">
        <input type="checkbox" id="eq_${i.id}" value="${i.id}" ${isAdded ? 'disabled' : ''}>
        <label for="eq_${i.id}">
          <strong>${i.equipment_templates?.name || i.model || '—'}</strong>
          <span style="color:#64748b;font-size:12px;"> · S/N: ${i.serial_number || '—'}</span>
          ${isAdded ? '<span style="color:#64748b;font-size:11px;"> · Already added</span>' : ''}
        </label>
      </div>`;
    }).join('') || '<div class="empty">No equipment in your database</div>';
    document.getElementById('equipModal').style.display = 'flex';
  }

  function closeEquipModal() { document.getElementById('equipModal').style.display = 'none'; }

  async function addSelectedEquipment() {
    const checked = [...document.querySelectorAll('#equipSelectorList input:checked')].map(c => c.value);
    if (!checked.length) { alert('Select at least one item'); return; }
    for (const itemId of checked) {
      await fetch(`${SUPABASE_URL}/rest/v1/assessment_equipment`, {
        method: 'POST',
        headers: { ...headers, Prefer: 'return=minimal' },
        body: JSON.stringify({ assessment_id: currentAssessmentId, equipment_item_id: parseInt(itemId) })
      });
    }
    closeEquipModal();
    loadSelectedEquipment(currentAssessmentId);
  }

  async function removeEquipment(id) {
    await fetch(`${SUPABASE_URL}/rest/v1/assessment_equipment?id=eq.${id}`, { method: 'DELETE', headers });
    loadSelectedEquipment(currentAssessmentId);
  }

  async function openPersonnelSelector() {
    const [peopleRes, addedRes] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/personnel?contractor_id=eq.${user.id}&select=*`, { headers }),
      fetch(`${SUPABASE_URL}/rest/v1/assessment_personnel?assessment_id=eq.${currentAssessmentId}&select=personnel_id`, { headers })
    ]);
    const people = await peopleRes.json();
    const added = await addedRes.json();
    const addedIds = new Set(added.map(a => String(a.personnel_id)));
    document.getElementById('persSelectorList').innerHTML = people.map(p => {
      const isAdded = addedIds.has(String(p.id));
      return `<div class="checkbox-item" style="${isAdded ? 'opacity:0.4;pointer-events:none;' : ''}">
        <input type="checkbox" id="per_${p.id}" value="${p.id}" ${isAdded ? 'disabled' : ''}>
        <label for="per_${p.id}">
          <strong>${p.full_name}</strong>
          <span style="color:#64748b;font-size:12px;"> · ${p.position || ''}</span>
          ${isAdded ? '<span style="color:#64748b;font-size:11px;"> · Already added</span>' : ''}
        </label>
      </div>`).join('') || '<div class="empty">No personnel in your database</div>';
    document.getElementById('persModal').style.display = 'flex';
  }

  function closePersModal() { document.getElementById('persModal').style.display = 'none'; }

  async function addSelectedPersonnel() {
    const checked = [...document.querySelectorAll('#persSelectorList input:checked')].map(c => c.value);
    if (!checked.length) { alert('Select at least one person'); return; }
    for (const persId of checked) {
      await fetch(`${SUPABASE_URL}/rest/v1/assessment_personnel`, {
        method: 'POST',
        headers: { ...headers, Prefer: 'return=minimal' },
        body: JSON.stringify({ assessment_id: currentAssessmentId, personnel_id: parseInt(persId) })
      });
    }
    closePersModal();
    loadSelectedPersonnel(currentAssessmentId);
  }

  async function removePersonnel(id) {
    await fetch(`${SUPABASE_URL}/rest/v1/assessment_personnel?id=eq.${id}`, { method: 'DELETE', headers });
    loadSelectedPersonnel(currentAssessmentId);
  }

  function getExpiryStyle(dateStr) {
    if (!dateStr || dateStr === '—' || dateStr === '-') return '';
    const expiry = new Date(dateStr);
    const today = new Date();
    today.setHours(0,0,0,0);
    const in14 = new Date(today);
    in14.setDate(in14.getDate() + 14);
    if (expiry < today) return 'background:#ffcccc;font-weight:bold;';
    if (expiry <= in14) return 'background:#fff3cc;font-weight:bold;';
    return '';
  }

  async function generateLoR() {
    const aRes = await fetch(`${SUPABASE_URL}/rest/v1/assessments?id=eq.${currentAssessmentId}`, { headers });
    const assessment = (await aRes.json())[0];

    const eRes = await fetch(`${SUPABASE_URL}/rest/v1/assessment_equipment?assessment_id=eq.${currentAssessmentId}&select=*,equipment_items(serial_number,model,equipment_templates(name),documents(*,document_types(document_name)))`, { headers });
    const equipment = await eRes.json();

    const pRes = await fetch(`${SUPABASE_URL}/rest/v1/assessment_personnel?assessment_id=eq.${currentAssessmentId}&select=*,personnel(*)`, { headers });
    const personnel = await pRes.json();

    const today = new Date();
    today.setHours(0,0,0,0);
    const todayStr = today.toLocaleDateString('en-GB');

    const allExpiries = [];

    let persRows = '';
    let pNum = 1;
    personnel.forEach(p => {
      const per = p.personnel;
      const expiry = per?.expiry_date || '';
      if (expiry && expiry !== '—' && expiry !== '-') allExpiries.push(new Date(expiry));
      const exStyle = getExpiryStyle(expiry);
      persRows += `<tr>
        <td>${pNum++}</td>
        <td>${per?.full_name || '—'}</td>
        <td>${per?.years_experience || '—'}</td>
        <td>${per?.position || '—'}</td>
        <td>${per?.certificate_number || '—'}</td>
        <td style="${exStyle}">${expiry || '—'}</td>
        <td class="ac"></td><td class="ac"></td><td class="ac"></td><td class="ac"></td><td class="ac"></td>
      </tr>`;
    });

    let equipRows = '';
    let eNum = 1;
    equipment.forEach(e => {
      const item = e.equipment_items;
      const docs = item?.documents || [];
      if (docs.length === 0) {
        equipRows += `<tr>
          <td>${eNum++}</td>
          <td>${item?.serial_number || '—'}</td>
          <td>${item?.equipment_templates?.name || item?.model || '—'}</td>
          <td>—</td><td>—</td><td>—</td>
          <td class="ac"></td><td class="ac"></td><td class="ac"></td><td class="ac"></td><td class="ac"></td>
        </tr>`;
      } else {
        docs.forEach(d => {
          const expiry = d.expiry_date || '';
          if (expiry && expiry !== '—' && expiry !== '-') allExpiries.push(new Date(expiry));
          const exStyle = getExpiryStyle(expiry);
          equipRows += `<tr>
            <td>${eNum++}</td>
            <td>${item?.serial_number || '—'}</td>
            <td>${item?.equipment_templates?.name || item?.model || '—'}</td>
            <td>${d.document_types?.document_name || '—'}</td>
            <td>${d.issue_date || '—'}</td>
            <td style="${exStyle}">${expiry || '—'}</td>
            <td class="ac"></td><td class="ac"></td><td class="ac"></td><td class="ac"></td><td class="ac"></td>
          </tr>`;
        });
      }
    });

    let validTill = null;
    let validTillStr = '—';
    let validTillBg = '#cccccc';
    let validTillColor = '#333';
    if (allExpiries.length > 0) {
      validTill = new Date(Math.min(...allExpiries.map(d => d.getTime())));
      validTillStr = validTill.toLocaleDateString('en-GB');
      const in14 = new Date(today);
      in14.setDate(in14.getDate() + 14);
      if (validTill < today) { validTillBg = '#cc0000'; validTillColor = 'white'; }
      else if (validTill <= in14) { validTillBg = '#ffaa00'; validTillColor = '#000'; }
      else { validTillBg = '#00aa44'; validTillColor = 'white'; }
