<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RADP - Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .card { background: #1e293b; padding: 32px; border-radius: 12px; width: 100%; max-width: 380px; }
    h1 { color: #38bdf8; font-size: 22px; margin-bottom: 6px; }
    p { color: #94a3b8; font-size: 13px; margin-bottom: 24px; }
    label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 14px; margin-bottom: 16px; }
    button { width: 100%; padding: 12px; background: #0284c7; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    .msg { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 13px; display: none; }
    .msg.error { background: #4c0519; color: #fda4af; display: block; }
    .msg.warning { background: #422006; color: #fbbf24; display: block; }
    a { color: #38bdf8; font-size: 13px; display: block; text-align: center; margin-top: 16px; }
  </style>
</head>
<body>
<div class="card">
  <h1>RADP Login</h1>
  <p>Contractor portal</p>

  <label>Email</label>
  <input type="email" id="email" placeholder="you@company.com">

  <label>Password</label>
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <div id="msg" class="msg"></div>
  <a href="/register.html">New contractor? Register here</a>
  <a href="/index.html">← Back to home</a>
</div>

<script>
  const SUPABASE_URL = 'https://fslleuedqlxpjnerruzt.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_O_f8pz1TnglyqJlO6z2EEA_J3EcJbwV';

  async function login() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const msg = document.getElementById('msg');

    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', apikey: SUPABASE_KEY },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!data.access_token) {
      msg.className = 'msg error';
      msg.textContent = 'Invalid email or password.';
      return;
    }

    // Проверяем статус профиля
    const profileRes = await fetch(`${SUPABASE_URL}/rest/v1/user_profiles?id=eq.${data.user.id}&select=status,full_name,company,service_line`, {
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${data.access_token}` }
    });
    const profiles = await profileRes.json();
    const profile = profiles[0];

    if (!profile || profile.status === 'pending') {
      msg.className = 'msg warning';
      msg.textContent = 'Your account is pending admin approval.';
      return;
    }

    if (profile.status === 'rejected') {
      msg.className = 'msg error';
      msg.textContent = 'Your account has been rejected. Contact admin.';
      return;
    }

    // Сохраняем сессию и переходим
    localStorage.setItem('radp_token', data.access_token);
    localStorage.setItem('radp_user', JSON.stringify({ id: data.user.id, email: data.user.email, ...profile }));
    window.location.href = '/contractor.html';
  }
</script>
</body>
</html>
