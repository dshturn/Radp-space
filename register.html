<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RADP - Register</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .card { background: #1e293b; padding: 32px; border-radius: 12px; width: 100%; max-width: 420px; }
    h1 { color: #38bdf8; font-size: 22px; margin-bottom: 6px; }
    p { color: #94a3b8; font-size: 13px; margin-bottom: 24px; }
    label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
    input, select { width: 100%; padding: 10px 12px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 14px; margin-bottom: 16px; }
    button { width: 100%; padding: 12px; background: #0284c7; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
    button:hover { background: #0369a1; }
    .msg { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 13px; display: none; }
    .msg.success { background: #064e3b; color: #6ee7b7; display: block; }
    .msg.error { background: #4c0519; color: #fda4af; display: block; }
    a { color: #38bdf8; font-size: 13px; display: block; text-align: center; margin-top: 16px; }
  </style>
</head>
<body>
<div class="card">
  <h1>RADP Registration</h1>
  <p>Create your contractor account</p>

  <label>Full Name</label>
  <input type="text" id="fullName" placeholder="John Smith">

  <label>Email</label>
  <input type="email" id="email" placeholder="you@company.com">

  <label>Password</label>
  <input type="password" id="password" placeholder="Min 6 characters">

  <label>Company</label>
  <select id="company">
    <option value="">Select company...</option>
  </select>

  <label>Service Line</label>
  <select id="serviceLine">
    <option value="">Select service line...</option>
  </select>

  <button onclick="register()">Create Account</button>
  <div id="msg" class="msg"></div>
  <a href="/index.html">← Back to home</a>
</div>

<script>
  const SUPABASE_URL = 'https://fslleuedqlxpjnerruzt.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_O_f8pz1TnglyqJlO6z2EEA_J3EcJbwV';

  async function loadOptions() {
  const [c, s] = await Promise.all([
    fetch(`${SUPABASE_URL}/rest/v1/companies?select=name&order=name`, { 
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } 
    }).then(r => r.json()),
    fetch(`${SUPABASE_URL}/rest/v1/service_lines?select=name&order=name`, { 
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } 
    }).then(r => r.json())
  ]);
  c.forEach(x => document.getElementById('company').innerHTML += `<option>${x.name}</option>`);
  s.forEach(x => document.getElementById('serviceLine').innerHTML += `<option>${x.name}</option>`);
}

  async function register() {
    const fullName = document.getElementById('fullName').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const company = document.getElementById('company').value;
    const serviceLine = document.getElementById('serviceLine').value;
    const msg = document.getElementById('msg');

    if (!fullName || !email || !password || !company || !serviceLine) {
      msg.className = 'msg error'; msg.textContent = 'Please fill all fields.'; return;
    }

    const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', apikey: SUPABASE_KEY },
      body: JSON.stringify({ email, password, options: { data: { full_name: fullName, company, service_line: serviceLine } } })
    });
    const data = await res.json();

    if (data.user) {
  await fetch(`${SUPABASE_URL}/rest/v1/user_profiles`, {
    method: 'POST',
    headers: { 
      'Content-Type': 'application/json', 
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    },
    body: JSON.stringify({ 
      id: data.user.id, 
      email, 
      full_name: fullName, 
      company, 
      service_line: serviceLine 
    })
  });
  msg.className = 'msg success';
  msg.textContent = 'Account created! Waiting for admin approval.';
}

  loadOptions();
</script>
</body>
</html>
