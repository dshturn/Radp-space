<!DOCTYPE html>
<html lang="en">
<head>

  <title>RADP - Readiness Assessment Digital Platform</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; flex-direction: column; min-height: 100vh; }
    .main { flex: 1; display: flex; justify-content: center; align-items: center; padding: 24px; }
    .card { background: #1e293b; padding: 40px; border-radius: 12px; text-align: center; max-width: 400px; width: 100%; }

    p { color: #94a3b8; margin-bottom: 24px; }
    .btn { display: block; background: #0284c7; color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; margin: 8px 0; }
    .btn:hover { background: #0369a1; }
  </style>
</head>
<body>
  <script>
    if (localStorage.getItem('radp_token')) window.location.replace('/contractor');
  </script>
  <div class="main">
    <div class="card">
      <h1>RADP</h1>
      <p>Readiness Assessment Digital Platform</p>
      <a href="/login.html" class="btn">Contractor Portal</a>

    </div>
  </div>

</html>
