<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RADP Dashboard – self‑contained</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:100%;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
body{background:#fff;color:#212529;line-height:1.2;-webkit-font-smoothing:antialiased;overflow-y:auto;min-height:100vh}
a{color:#007bff;text-decoration:none;cursor:pointer}
a:hover,a:focus{text-decoration:underline}
a:visited{color:#5a5a5a}
.xlsx-link a,.pdf-link a{color:#007bff;text-decoration:none}
.xlsx-link a:hover,.xlsx-link a:focus,.pdf-link a:hover,.pdf-link a:focus{text-decoration:underline}
:root{--bg-body:#ffffff;--bg-card:#ffffff;--radius:8px;--shadow:0 2px 6px rgba(0,0,0,.07);--color-primary:#007bff;--color-muted:#666666;--color-secondary:#3498db;--color-success:#2ecc71;--color-danger:#e74c3c;--color-warning:#f1c40f}
.wrapper{padding:.75rem;background:var(--bg-body);border-radius:var(--radius);box-shadow:var(--shadow);display:flex;flex-direction:column;gap:1rem;min-height:100vh}
.row{display:flex;flex-wrap:none;gap:1rem;justify-content:center}
.col-12{flex:0 0 100%}
.col-md-2{flex:0 0 calc(50% - .5rem)}
.col-lg-6{flex:0 0 calc(50% - .5rem)}
@media(min-width:768px){.col-md-2{flex:0 0 calc(16.666% - .5rem)}}
@media(min-width:992px){.col-lg-6{flex:0 0 calc(50% - .5rem)}}
.kpi-card{background:linear-gradient(135deg,#f5faff,#e6f0ff);border:1px solid rgba(0,123,255,.12);border-radius:var(--radius);box-shadow:var(--shadow);text-align:center;transition:transform .2s,box-shadow .2s}
.kpi-card:hover{transform:scale(1.03);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.kpi-card .icon{font-size:1.8rem;margin-bottom:.4rem;color:var(--color-primary)}
.tile{background:var(--bg-card);border-radius:var(--radius);border:1px solid #aaaaaa;box-shadow:var(--shadow);padding:.75rem;width:200px;display:flex;flex-direction:column;justify-content:space-between;transition:transform .2s,box-shadow .2s}
.tile:hover{transform:scale(1.04);box-shadow:0 0 12px 4px rgba(0,123,255,.4)}
.tile.expired{background:#ffebeb;border-left:4px solid var(--color-danger)}
.tile.warning{background:#fff9e6;border-left:4px solid var(--color-warning)}
.tile.green-tile{background:#e6f9e6;border-left:4px solid var(--color-success)}
.tile.warning{box-shadow:inset 0 0 6px rgba(255,193,7,.15)}
.tile.expired{box-shadow:inset 0 0 6px rgba(231,76,60,.15)}
.tile,.kpi-card,.tile-wrapper>.tile{transition:transform .18s ease,box-shadow .18s ease}
.tile:hover,.kpi-card:hover,.tile-wrapper>.tile:hover{transform:translateY(-4px);box-shadow:0 8px 16px rgba(0,0,0,.18),0 6px 12px rgba(0,0,0,.15)}
.tile:focus-visible,.kpi-card:focus-visible,button:focus-visible{outline:none;box-shadow:0 0 0 3px rgba(0,123,255,.30)}
.dialogue-window{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:20px;border:1px solid #ddd;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,.2);width:500px;max-width:90%;z-index:1001;display:none}
.dialogue-window .close-button{position:absolute;top:10px;right:10px;font-size:18px;cursor:pointer}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.30);z-index:1000;display:none}
#spinner{margin:2rem auto;font-size:1.2rem;text-align:center}
body,.wrapper,.kpi-card,.tile,.tile-wrapper,.kpi-tiles-wrapper,.dialogue-window,#spinner{text-align:center}
h1,h2,h3,h4,h5,h6{text-align:center;font-weight:600}
p{text-align:justify}
.onwcod-wrapper{border:1px solid #aaaaaa;border-radius:var(--radius);background:#fff9c4;padding:12px;margin-bottom:1rem}
.offwcodwsd-wrapper{border:1px solid #aaaaaa;border-radius:var(--radius);background:#e3f2fd;padding:12px;margin-bottom:1rem}
#onwcod-grid,#incomplete-onwcod-grid,#offwcodwsd-grid,#incomplete-offwcodwsd-grid{border:1px solid #aaaaaa;background:#ffffff;border-radius:var(--radius);padding:.75rem}
.tiles-grid{display:flex;flex-wrap:wrap;gap:.75rem;justify-content:center}
.kpi-tiles-wrapper{padding:20px;background:cadetblue;border-radius:10px}

/* ----- CRCH dialog specific styles ----- */
#crch-dialog .form-group{margin:10px 0;text-align:left}
#crch-dialog label{font-weight:500;margin-bottom:5px;display:block}
#crch-dialog input, #crch-dialog select{width:100%;padding:8px;border:1px solid #ccc;border-radius:4px}
#crch-dialog .submit-button{width:100%;margin-top:15px}

/* 1️⃣  Gradient on the outer wrapper */
.ui-dialog .ui-dialog-content#crch-dialog {
    background: linear-gradient(135deg, #f8fbff, #e6f0ff);
    border-radius: 12px;               /* keep the rounded corners */
    padding: 20px;                     /* optional – gives the form some breathing room */
}

/* 2️⃣  If you also want a different colour for the inner panel (the form itself) */
#crch-dialog.ui-dialog-content {
    background: #ffffff;               /* pure white – change if you like */
    border-radius: 8px;
}

/* 3️⃣  Title‑bar (blue) */
.ui-dialog .ui-dialog-titlebar {
    background: #007bff;
    color: #fff;
}

/* 4️⃣  Close button (white “×”) */
.ui-dialog .ui-dialog-titlebar-close .ui-icon {
    background-image: none;            /* remove the default jQuery‑UI icon */
    color: #fff;
    font-weight: bold;
}</style>
</head>

<body>
<div class="wrapper">

    <!-- ==== KPI ROW ==== -->
    <div class="kpi-tiles-wrapper">
        <div class="row g-3 mb-3" id="kpi-row"></div>
    </div>

    <!-- ==== TILE SECTION ==== -->
    <div class="tile-section">
        <div class="row g-4">

            <!-- LEFT column (ONWCOD) -->
            <div class="col-12 col-lg-6">
                <div class="onwcod-wrapper">
                    <h5 class="mb-2">ONWCOD Packages</h5>
                    <div id="onwcod-grid" class="tiles-grid"></div>

                    <h5 class="mt-3 mb-2">ONWCOD Active Requests</h5>

            <div class="col-12 col-lg-6">
                <div class="offwcodwsd-wrapper">

                    <div id="offwcodwsd-grid" class="tiles-grid"></div>

                    <h5 class="mt-3 mb-2">OFFWCOD/WSD Active Requests</h5>
                    <div id="incomplete-offwcodwsd-grid" class="tiles-grid"></div>

        </div>

</div>

<!-- ==== Loading spinner ==== -->
<div id="spinner" class="text-center my-4">Loading…</div>

    <div id="dialogue-content"></div>
    <span class="close-button" id="dialogue-close">×</span>
</div>

<!-- ==== Crew / Equipment Change Request dialog (hidden) ==== -->
<div id="crch-dialog" title="Crew / Equipment Change Request" style="display:none;">
    <form id="crch-form">
        <div class="form-group"><label>NAWCOD Division</label>
            <select id="crch-listSelect" disabled style="width:100%;"></select>
        </div>

        <div class="form-group"><label>Assessment Type</label>
            <select id="crch-Assessment_x0020_Type" required style="width:100%;"></select>
        </div>

        <div class="form-group"><label>Service Provider</label>
            <input type="text" id="crch-Service_x0020_Provider" readonly>
        </div>

        </div>

<!-- --------------------------------------------------------------
     Load jQuery & jQuery‑UI **before** the main script
     -------------------------------------------------------------- -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

<!-- --------------------------------------------------------------
     MAIN SCRIPT – all the logic (fixed)
     -------------------------------------------------------------- -->
<script>
/* ====================== GLOBAL SETTINGS ====================== */
const siteBase = 'https://sharek.aramco.com.sa/modern/30037952';
const restBase = `${siteBase}/_api/web`;
const listUrl = t => `${restBase}/lists/GetByTitle('${encodeURIComponent(t)}')/items`;

const listConfig = [
  {friendly:'ONWCOD',title:'ONWCOD Assessment Requests',url:listUrl('ONWCOD Assessment Requests'),fieldsSelect:"ID,Service_x0020_Type,Service_x0020_Provider,Destination,lorValidityDate,lorIssueDate"},
  {friendly:'OFFWCOD&WSD',title:'OFFWCOD&WSD Assessment Requests',url:`${restBase}/lists/GetByTitle('${encodeURIComponent('OFFWCOD&WSD Assessment Requests')}')/items`,fieldsSelect:"ID,Service_x0020_Type,Service_x0020_Provider,Destination,lorValidityDate,lorIssueDate"},
  {friendly:'ONWSD',title:'ONWSD Assessment Requests',url:listUrl('ONWSD Assessment Requests'),fieldsSelect:"ID,Service_x0020_Type,Service_x0020_Provider,Destination,lorValidityDate,lorIssueDate"},
  {friendly:'SAOWCOD',title:'SAOWCOD',url:listUrl('SAOWCOD'),fieldsSelect:"ID,Service_x0020_Type,Service_x0020_Provider,Destination,lorValidityDate,lorIssueDate"},
  {friendly:'SAGWCOD',title:'SAGWCOD',url:listUrl('SAGWCOD'),fieldsSelect:"ID,Service_x0020_Type,Service_x0020_Provider,Destination,lorValidityDate,lorIssueDate"}
];

/* ====================== FETCH HELPERS ====================== */
async function getJSON(u){
  const r = await fetch(u,{method:'GET',headers:{'Accept':'application/json; odata=verbose'},credentials:'same-origin'});
  if(!r.ok){ const t = await r.text(); throw new Error(`❌ ${r.status} ${r.statusText}: ${t}`); }
  return r.json();
}
async function fetchAll(u){
  const a=[]; let n=`${u}?$orderby=Modified desc&$top=5000`;
  while(n){ const d=await getJSON(n); a.push(...d.d.results); n=d.d.__next||null; }
  return a;
}
const diffInDays = (a,b)=>Math.floor((a-b)/(1000*60*60*24));
const makeAbsoluteUrl = (b,r)=>{ if(!b.endsWith('/'))b+='/'; return new URL(r,b).href; };

/* ====================== DATE HELPERS ====================== */
function dateFromFileName(f){
  if(!f) return null;
  const c = f.replace(/\s+/g,'').toUpperCase();
  let m = c.match(/(\d{4})[-_]?(\d{2})[-_]?(\d{2})/);
  if(m) return new Date(`${m[1]}-${m[2]}-${m[3]}`);
  m = c.match(/(\d{2})[-_]?(\d{2})[-_]?(\d{4})/);
  if(m) return new Date(`${m[3]}-${m[2]}-${m[1]}`);
  m = c.match(/(\d{2})[._-](\d{2})[._-](\d{2,4})/);
  if(m){
    const y = m[3].length===2?`20${m[3]}`:m[3];
    const mo = m[1].padStart(2,'0');
    const d = m[2].padStart(2,'0');
    return new Date(`${y}-${mo}-${d}`);
  }
  return null;
}
function baseTitleFromFileName(f){
  if(!f) return '';
  return f.replace(/(\d{4}[-_]\d{2}[-_]\d{2})|(\d{8})|(\d{2}[-_]\d{2}[-_]\d{4})|(\d{2}\.\d{2}\.\d{2})|(\d{1,2}[._-]\d{1,2}[._-]\d{2,4})/g,'')
          .replace(/\s*for\s+[A-Z]+$/i,'')
          .trim()
          .replace(/[_\-\s]+$/,'')
          .replace(/\s{2,}/g,' ');
}
function pickMainxlsx(xlsxs){
  if(!xlsxs.length) return null;
  const clean = xlsxs.filter(p=>p.FileName?.toLowerCase().endsWith('.xlsx') && !/program/i.test(p.FileName));
  if(!clean.length) return null;
  const prioritized = clean.filter(p=>/\d{1,2}\.\d{1,2}\.\d{2}/.test(p.FileName));
  if(prioritized.length) return prioritized[0];
  const dated = clean.map(p=>({xlsx:p,date:dateFromFileName(p.FileName)})).filter(o=>o.date);
  if(!dated.length){
    clean.sort((a,b)=>new Date(b.Modified)-new Date(a.Modified));
    return clean[0];
  }
  dated.sort((a,b)=>b.date-a.date);
  return dated[0].xlsx;
}
function pickMainpdf(pdfs){
  if(!pdfs.length) return null;
  const clean = pdfs.filter(p=>p.FileName?.toLowerCase().endsWith('.pdf') && !/program/i.test(p.FileName));
  if(!clean.length) return null;
  const prioritized = clean.filter(p=>/\d{1,2}\.\d{1,2}\.\d{2}/.test(p.FileName));
  if(prioritized.length) return prioritized[0];
  const dated = clean.map(p=>({pdf:p,date:dateFromFileName(p.FileName)})).filter(o=>o.date);
  if(!dated.length){
    clean.sort((a,b)=>new Date(b.Modified)-new Date(a.Modified));
    return clean[0];
  }
  dated.sort((a,b)=>b.date-a.date);
  return dated[0].pdf;
}

/* ====================== FIELD HELPERS ====================== */
function getFieldInternalName(columns, fieldId){
  for(let i=0;i<columns.get_count();i++){
    const col = columns.getItemAtIndex(i);
    if(col.get_internalName()===fieldId) return col.get_internalName();
  }
  return null;
}
function getFieldInternalNameByTitle(columns, fieldTitle){
  for(let i=0;i<columns.get_count();i++){
    const col = columns.getItemAtIndex(i);
    if(col.get_title()===fieldTitle) return col.get_internalName();
  }
  return null;
}

/* ====================== TILE RENDERING ====================== */
/* --------------------------------------------------------------
   renderTiles() – fixed version
   -------------------------------------------------------------- */
async function renderTiles(containerId, incompleteContainerId, listObj) {
  const today = new Date();

  // -----------------------------------------------------------------
  // 1️⃣  Pull the list items (including attachments)
  // -----------------------------------------------------------------
  const q = `$select=${listObj.fieldsSelect},AttachmentFiles/FileName,AttachmentFiles/ServerRelativeUrl,AttachmentFiles/Modified,Status,Created&$expand=AttachmentFiles&$top=5000`;
  const resp = await getJSON(`${listObj.url}?${q}`);
  const items = resp.d.results;

  // -----------------------------------------------------------------
  // 2️⃣  Build an array that contains the *chosen* xlsx / pdf for each record
  // -----------------------------------------------------------------
  const records = await Promise.all(
    items.map(async rec => {
      const atts = (rec.AttachmentFiles && rec.AttachmentFiles.results) || [];

      const xlsxs = atts.filter(a => a.FileName?.toLowerCase().endsWith('.xlsx'));
      const pdfs   = atts.filter(a => a.FileName?.toLowerCase().endsWith('.pdf'));

      const chosenXlsx = pickMainxlsx(xlsxs);
      const chosenPdf  = pickMainpdf(pdfs);

      // If the record has no useful attachment we ignore it for the “packages” view
      if (!chosenXlsx && !chosenPdf) return null;

      const xlsxUrl  = chosenXlsx ? makeAbsoluteUrl(siteBase, chosenXlsx.ServerRelativeUrl) : '';
      const xlsxName = chosenXlsx ? chosenXlsx.FileName : '';
      const pdfUrl   = chosenPdf  ? makeAbsoluteUrl(siteBase, chosenPdf.ServerRelativeUrl)  : '';
      const pdfName  = chosenPdf  ? chosenPdf.FileName : '';

      return { rec, xlsxUrl, xlsxName, pdfUrl, pdfName };
    })
  );

  // -----------------------------------------------------------------
  // 3️⃣  Keep only the records whose LOR is still valid (or will expire ≤30 days)
  // -----------------------------------------------------------------
  const filtered = records.filter(it => {
    if (!it) return false;
    const issue = it.rec.lorIssueDate;
    const valid = it.rec.lorValidityDate;
    if (!issue || !valid) return false;

    const issueObj = new Date(issue);
    const validObj = new Date(valid);
    return issueObj <= today && diffInDays(today, validObj) <= 30;
  });

  // -----------------------------------------------------------------
  // 4️⃣  Keep the *newest* record for each unique Provider‑Service‑BaseTitle
  // -----------------------------------------------------------------
  const freshest = new Map();
  filtered.forEach(it => {
    const prov = it.rec.Service_x0020_Provider?.trim() || 'Unknown';
    const svcRaw = Array.isArray(it.rec.Service_x0020_Type?.results)
      ? it.rec.Service_x0020_Type.results[0]
      : it.rec.Service_x0020_Type;
    const svc = svcRaw?.trim() || 'Unknown';
    const base = baseTitleFromFileName(it.xlsxName);
    const key = `${prov}|${svc}|${base || it.xlsxName}`;

    const cur = freshest.get(key);
    if (!cur || new Date(it.rec.lorIssueDate) > new Date(cur.rec.lorIssueDate)) {
      freshest.set(key, it);
    }
  });
  const finalArr = Array.from(freshest.values());

  // -----------------------------------------------------------------
  // 5️⃣  Build the “Active‑Requests” tiles (records that are not completed)
  // -----------------------------------------------------------------
  const incompleteRecords = items.filter(rec => !rec.Status || !rec.Status.toLowerCase().includes('completed'));
  const incompleteTiles = incompleteRecords.map(rec => ({
    rec,
    xlsxUrl: '',
    xlsxName: '',
    pdfUrl: '',
    pdfName: ''
  }));

  /* --------------------------  Render Packages  -------------------------- */
  const container = document.getElementById(containerId);
  container.innerHTML = '';

  if (!finalArr.length && !incompleteTiles.length) {
    container.innerHTML = '<p class="text-muted">No recent packages found.</p>';
    return;
  }

  finalArr.forEach(({ rec, xlsxUrl, xlsxName, pdfUrl, pdfName }) => {
    /* --------------------------------------------------------------
       5.1️⃣  ALWAYS declare the three helper strings – they must exist
              for *every* record, otherwise we get a ReferenceError.
       -------------------------------------------------------------- */
    let providerHTML = '';
    let serviceHTML  = '';
    let destHTML     = '';

    /* --------------------------------------------------------------
       5.2️⃣  Fill them according to the list we are rendering.
       -------------------------------------------------------------- */
    if (listObj.friendly === 'ONWCOD') {
      // ONWCOD – only provider & service are shown
      providerHTML = `<h5>${rec.Service_x0020_Provider?.trim() || 'Unknown'}</h5>`;
      const svcRaw = Array.isArray(rec.Service_x0020_Type?.results)
        ? rec.Service_x0020_Type.results[0]
        : rec.Service_x0020_Type;
      serviceHTML = `<div class="small">${svcRaw?.trim() || 'Unknown'}</div>`;
    } else if (listObj.friendly === 'OFFWCOD&WSD') {
      // OFFWCOD & WSD – we also want the destination title
      const d = Array.isArray(rec.Destination?.results)
        ? rec.Destination.results.join(', ')
        : rec.Destination || '';
      if (d) destHTML = `<h4 class="dest-titles">${d}</h4>`;

      providerHTML = `<h5>${rec.Service_x0020_Provider?.trim() || 'Unknown'}</h5>`;
      const svcRaw = Array.isArray(rec.Service_x0020_Type?.results)
        ? rec.Service_x0020_Type.results[0]
        : rec.Service_x0020_Type;
      serviceHTML = `<div class="small">${svcRaw?.trim() || 'Unknown'}</div>`;
    } else {
      // All other lists – we simply don’t show provider / service /
      // destination (but we still need the variables, they stay empty)
    }

    /* --------------------------------------------------------------
       5.3️⃣  Date formatting & colour‑coding (expired / warning)
       -------------------------------------------------------------- */
    const issueFmt = rec.lorIssueDate ? new Date(rec.lorIssueDate).toLocaleDateString() : '‑';
    const validFmt = rec.lorValidityDate ? new Date(rec.lorValidityDate).toLocaleDateString() : '‑';

    const lorValid = new Date(rec.lorValidityDate);
    const diff = Math.floor((lorValid - today) / (1000 * 60 * 60 * 24));

    let extraClass = '';
    if (diff < 0) extraClass = 'expired';
    else if (diff <= 14) extraClass = 'warning';

    /* --------------------------------------------------------------
       5.4️⃣  Build the tile DOM element
       -------------------------------------------------------------- */
    const tileWrapper = document.createElement('div');
    tileWrapper.className = 'tile-wrapper';

    // If we have a destination title we want it *outside* the coloured tile
    if (destHTML) {
      const titleDiv = document.createElement('div');
      titleDiv.innerHTML = destHTML;
      tileWrapper.appendChild(titleDiv);
    }

    const tile = document.createElement('div');
    tile.className = `tile ${extraClass}`;
    tile.innerHTML = `
      ${providerHTML}
      ${serviceHTML}
      <div class="small"><strong>LOR Issue Date:</strong> ${issueFmt}</div>
      <div class="small"><strong>LOR Validity Date:</strong> ${validFmt}</div>
      <div class="small"><strong>Request ID:</strong> ${rec.ID}</div>
      ${xlsxUrl ? `<div class="xlsx-link"><a href="${xlsxUrl}" target="_blank" rel="noopener">${xlsxName}</a></div>` : ''}
      ${pdfUrl  ? `<div class="pdf-link"><a href="${pdfUrl}"  target="_blank" rel="noopener">${pdfName}</a></div>` : ''}
      <button class="btn btn-sm btn-primary crew-equipment-change-request-button">Crew/Equipment Change Request</button>
    `;
    tileWrapper.appendChild(tile);
    container.appendChild(tileWrapper);

    /* --------------------------------------------------------------
       5.5️⃣  Store the payload on the tile (used by the dialog)
       -------------------------------------------------------------- */
    const tileData = {
      ID: rec.ID,
      provider: rec.Service_x0020_Provider?.trim() || '',
      serviceType: (Array.isArray(rec.Service_x0020_Type?.results)
        ? rec.Service_x0020_Type.results[0]
        : rec.Service_x0020_Type) || '',
      destination: (Array.isArray(rec.Destination?.results)
        ? rec.Destination.results.join(', ')
        : rec.Destination) || '',
      assessment: rec.Assessment_x0020_Type || '',
      lorIssueDate: rec.lorIssueDate,
      lorValidityDate: rec.lorValidityDate,
      xlsxUrl,
      xlsxName,
      pdfUrl,
      pdfName,
      rawRecord: rec
    };
    tile.dataset.payload = JSON.stringify(tileData);

    /* --------------------------------------------------------------
       5.6️⃣  Click handler – opens the CR/CH dialog
       -------------------------------------------------------------- */
    tile
      .querySelector('.crew-equipment-change-request-button')
      .addEventListener('click', () => {
        const data = JSON.parse(tile.dataset.payload);
        openCrchDialog(data);
      });
  });

  /* --------------------------  Render Active‑Requests  -------------------------- */
  const incompleteContainer = document.getElementById(incompleteContainerId);
  incompleteContainer.innerHTML = '';

  // Sort active‑request tiles for the OFF‑list by destination (optional)
  if (listObj.friendly === 'OFFWCOD&WSD') {
    incompleteTiles.sort((a, b) => {
      const dA = Array.isArray(a.rec.Destination?.results)
        ? a.rec.Destination.results.join(', ')
        : a.rec.Destination || '';
      const dB = Array.isArray(b.rec.Destination?.results)
        ? b.rec.Destination.results.join(', ')
        : b.rec.Destination || '';
      return dA.localeCompare(dB);
    });
  }

  incompleteTiles.forEach(({ rec }) => {
    let providerHTML = '';
    let serviceHTML = '';
    let destHTML = '';
    let dateHTML = '';

    if (listObj.friendly === 'ONWCOD') {
      providerHTML = `<h5>${rec.Service_x0020_Provider?.trim() || 'Unknown'}</h5>`;
      const svcRaw = Array.isArray(rec.Service_x0020_Type?.results)
        ? rec.Service_x0020_Type.results[0]
        : rec.Service_x0020_Type;
      serviceHTML = `<div class="small">${svcRaw?.trim() || 'Unknown'}</div>`;
      dateHTML = `<div class="small"><strong>Request Created:</strong> ${new Date(rec.Created).toLocaleDateString()}</div>`;
    } else if (listObj.friendly === 'OFFWCOD&WSD') {
      const d = Array.isArray(rec.Destination?.results)
        ? rec.Destination.results.join(', ')
        : rec.Destination || '';
      if (d) destHTML = `<h4 class="dest-titles">${d}</h4>`;
      providerHTML = `<h5>${rec.Service_x0020_Provider?.trim() || 'Unknown'}</h5>`;
      const svcRaw = Array.isArray(rec.Service_x0020_Type?.results)
        ? rec.Service_x0020_Type.results[0]
        : rec.Service_x0020_Type;
      serviceHTML = `<div class="small">${svcRaw?.trim() || 'Unknown'}</div>`;
      dateHTML = `<div class="small"><strong>Request Created:</strong> ${new Date(rec.Created).toLocaleDateString()}</div>`;
    }

    const tileWrapper = document.createElement('div');
    tileWrapper.className = 'tile-wrapper';

    if (destHTML) {
      const titleDiv = document.createElement('div');
      titleDiv.innerHTML = destHTML;
      tileWrapper.appendChild(titleDiv);
    }

    const tile = document.createElement('div');
    tile.className = 'tile green-tile';
    tile.innerHTML = `
      ${providerHTML}
      ${serviceHTML}
      ${dateHTML}
      <div class="small"><strong>Status:</strong> ${rec.Status || 'Unknown'}</div>
      <div class="small"><strong>Request ID:</strong> ${rec.ID}</div>
      <button class="btn btn-sm btn-success change-status-button">Change Status</button>
    `;
    tileWrapper.appendChild(tile);
    incompleteContainer.appendChild(tileWrapper);

    tile
      .querySelector('.change-status-button')
      .addEventListener('click', () => displayDialogueWindow('CS'));
  });
}
/* ====================== DIALOGUE WINDOW (Change‑Status) ====================== */
function displayDialogueWindow(type){
  const dlg = document.getElementById('dialogue-window');
  const content = document.getElementById('dialogue-content');
  const overlay = document.getElementById('overlay');
  const closeBtn = document.getElementById('dialogue-close');

  content.innerHTML = (type==='CS')
    ? 'Change Status dialogue window content'
    : 'Crew/Equipment Change Request dialogue window content';

  dlg.style.display='block';
  overlay.style.display='block';

  const hide = ()=>{dlg.style.display='none';overlay.style.display='none';};
  closeBtn.onclick = hide;
  overlay.onclick = hide;
}

/* ====================== CREW / EQUIPMENT CHANGE REQUEST DIALOG ====================== */
function openCrchDialog(data){
  /* ---- 1️⃣  Fill static (read‑only) fields ---- */
  $('#crch-listSelect')
      .empty()
      .append(`<option value="${data.listName}">${data.listName === 'offlist' ? 'OFFWCOD&WSD' :
                                          data.listName === 'onlist' ? 'ONWCOD' :
                                          'ONWSD'}</option>`);

  $('#crch-Assessment_x0020_Type').val(data.assessment);
  $('#crch-Service_x0020_Provider').val(data.provider);
  $('#crch-Service_x0020_Type').val(data.serviceType);
  $('#crch-Destination').val(data.destination);

  // ----- LOR dates (fixed ternary) -----
  $('#crch-lorIssueDate').val(
      data.lorIssueDate ? new Date(data.lorIssueDate).toISOString().substr(0,10) : ''
  );
  $('#crch-lorValidityDate').val(
      data.lorValidityDate ? new Date(data.lorValidityDate).toISOString().substr(0,10) : ''
  );

  /* ---- 2️⃣  Show / hide the attachment field (same rule you already use) ---- */
  const attField = $('#crch-attachmentField');
  if (data.assessment && data.assessment.trim().toLowerCase() === 'full set'){
    attField.show().find('label').text('Well Programs (mandatory)');
  }else{
    attField.show().find('label').text('Well Programs (optional)');
  }

  /* ---- 3️⃣  Reset focal‑point (the only editable field) ---- */
  $('#crch-FocalPoint').val('').removeClass('error');

  /* ---- 4️⃣  Initialise the jQuery‑UI dialog (once) ---- */
  const $dlg = $('#crch-dialog');
  if (!$dlg.data('ui-dialog')) {
    $dlg.dialog({
      modal:true,
      width:500,
      closeOnEscape:false,
      dialogClass:'custom-dialog',
      open:()=>$('#crch-FocalPoint').focus(),
      close:()=>$('#crch-form')[0].reset()
    });

    /* ---- 5️⃣  Form submit – reuse the same SharePoint logic you already have ---- */
    $('#crch-form').on('submit',function(e){
      e.preventDefault();

      const fp = $('#crch-FocalPoint').val().trim();
      const emailRx = /^\s*(?:[^<]*<)?\s*([^\s@<>]+@[^\s@<>]+\.[^\s@<>]+)\s*>?\s*$/;
      const mobileRx = /^\d{10}$/;
      if(!emailRx.test(fp) && !mobileRx.test(fp)){
        alert('Please enter a valid e‑mail address or a 10‑digit mobile number for the focal point.');
        $('#crch-FocalPoint').focus();
        return;
      }

      /* ---- Build a temporary item that mimics the real SP item ---- */
      const fakeItem = { set_item:(n,v)=>{ this[n]=v; } };

      const title = `${data.assessment} Assessment of ${data.provider} ${data.serviceType} Equipment for ${data.destination}`;
      safeSetItem(fakeItem, getFieldInternalNameByTitle(columns,'Title'), title);
      safeSetItem(fakeItem, getFieldInternalNameByTitle(columns,'Assessment Type'), data.assessment);
      safeSetItem(fakeItem, getFieldInternalNameByTitle(columns,'Service Provider'), data.provider);
      safeSetItem(fakeItem, getFieldInternalNameByTitle(columns,'Service Type'), data.serviceType);
      safeSetItem(fakeItem, getFieldInternalNameByTitle(columns,'Destination'), data.destination);
      safeSetItem(fakeItem, getFieldInternalNameByTitle(columns,'LOR Issue Date'), data.lorIssueDate);
      safeSetItem(fakeItem, getFieldInternalNameByTitle(columns,'LOR Validity Date'), data.lorValidityDate);
      safeSetItem(fakeItem, getFieldInternalNameByTitle(columns,"Service Provider's Focal Point (email, mobile)"), fp);

      /* ---- 1️⃣  Create the SharePoint item (same code you already use) ---- */
      SP.SOD.executeFunc('sp.js','SP.ClientContext',function(){
        const ctx = SP.ClientContext.get_current();
        const web = ctx.get_web();
        const list = web.get_lists().getByTitle(listTitle);   // listTitle is set elsewhere in your original code
        const itemInfo = new SP.ListItemCreationInformation();
        const item = list.addItem(itemInfo);

        // copy every field we stored on fakeItem onto the real SP item
        for(const prop in fakeItem){
          if(Object.prototype.hasOwnProperty.call(fakeItem,prop)){
            item.set_item(prop, fakeItem[prop]);
          }
        }

        item.update();
        ctx.load(item);
        ctx.executeQueryAsync(
          function(){   // ✅ item created
            const itemId = item.get_id();

            /* ---- 2️⃣  Upload attachments (if any) ---- */
            const files = document.getElementById('crch-fileInput').files;
            const siteUrl = _spPageContextInfo ? _spPageContextInfo.webAbsoluteUrl :
                           'https://sharek.aramco.com.sa/modern/30037952';
            addAttachments(siteUrl, listTitle, itemId, files)
              .then(()=>{
                /* ---- 3️⃣  Build & fire the mailto link ---- */
                const cc = [];
                switch(data.listName){
                  case 'offlist':
                    cc.push('30037971.NAWCODESUDOCUMENTASSESSMENTGROUP@Exchange.Aramco.com.sa',
                            'DS.30037952.NAWCODSAFETYTEAM@Exchange.Aramco.com.sa',
                            'DS.30012226.NAWCODOFFWSDCOORDINATORS@Exchange.Aramco.com.sa');
                    break;
                  case 'onlist':
                    cc.push('30037971.NAWCODESUDOCUMENTASSESSMENTGROUP@Exchange.Aramco.com.sa',
                            'DS.30037952.NAWCODSAFETYTEAM@Exchange.Aramco.com.sa',
                            'DS.30037958.NAWCODONWCODCOORDINATORS@Exchange.Aramco.com.sa');
                    break;
                  case 'onwsdlist':
                    cc.push('30037971.NAWCODESUDOCUMENTASSESSMENTGROUP@Exchange.Aramco.com.sa',
                            'DS.30037952.NAWCODSAFETYTEAM@Exchange.Aramco.com.sa',
                            'test@aramco.com');
                    break;
                }

                const subject = `${listNameText} Request ${itemId}: ${title}`;
                const link    = 'https://eft.aramco.com/';
                const body = `Dear ${data.provider} team,

You need to do the following:

1. Please visit ${link} for more information.
2. Read responsibilities that are on you during the readiness assessment process.
3. Prepare a List of Readiness incl. all manpower and equipment (incl. lifting equipment by piece, separately each sling, shackles, etc.) that will be involved in operations.
4. Upload all necessary paperwork to the respective folders in Aramco cloud, including:
   - CVs, certificate, fitness reports for manpower
   - Maintenance reports, inspection reports, load test reports, COCs, manuals, specs for equipment (Engineering items and Safety items)

Regards
${listNameText} Coordinator`;

                const mailto = `mailto:${encodeURIComponent(fp)}?cc=${encodeURIComponent(cc.join(';'))}&subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                window.location.href = mailto;

                /* ---- 4️⃣  Show success dialog (same UI you already have) ---- */
                $("#dialog").html(
                  '<div class="dialog-content">'+
                  '<h2 class="dialog-title">Record and email generated successfully.</h2>'+
                  `<p class="dialog-message">Your record:<br><strong>${title}</strong><br>has been created and an email was sent.</p>`+
                  '<div class="dialog-buttons"><button class="dialog-button" onclick="window.location.reload()">Create another record</button></div>'+
                  '</div>'
                );
                $("#dialog").dialog({
                  modal:true,
                  closeOnEscape:false,
                  dialogClass:"custom-dialog",
                  width:"auto",
                  open:function(){
                    $(this).closest(".ui-dialog").find(".ui-dialog-titlebar-close").hide();
                  }
                });

                $('#crch-dialog').dialog('close');
              })
              .catch(err=>{
                alert('Record created but some attachments could not be uploaded – see console.');
                console.error(err);
                $('#crch-dialog').dialog('close');
              });
          },
          function(sender,args){
            alert('Error creating the SharePoint item: '+args.get_message());
          }
        );
      });
    });
  }

  $dlg.dialog('open');
}

/* ====================== PAGE INITIALISATION ====================== */
(async ()=>{
  try{
    const rawLists = await Promise.all(listConfig.map(c=>fetchAll(c.url)));
    const allRecords = [];
    rawLists.forEach((items,i)=>{
      const name = listConfig[i].friendly;
      items.forEach(r=>allRecords.push({record:r,listName:name}));
    });
    allRecords.sort((a,b)=>new Date(b.record.Modified)-new Date(a.record.Modified));

    await renderTiles('onwcod-grid','incomplete-onwcod-grid',listConfig.find(c=>c.friendly==='ONWCOD'));
    await renderTiles('offwcodwsd-grid','incomplete-offwcodwsd-grid',listConfig.find(c=>c.friendly==='OFFWCOD&WSD'));

    const kpiRow = document.getElementById('kpi-row');
    const mkCard = (icon,val,label,cls='')=>`
      <div class="col-12 col-md-2">
        <div class="kpi-card ${cls}">
          <div class="icon">${icon}</div>
          <div class="value">${val}</div>
          <div class="label">${label}</div>
        </div>
      </div>`;

    const onwcodTiles = document.getElementById('onwcod-grid').children.length;
    const offwcodTiles = document.getElementById('offwcodwsd-grid').children.length;
    const totalPackages = onwcodTiles + offwcodTiles;

    const closeToExpiry = document.querySelectorAll('.tile.warning').length;
    const expired        = document.querySelectorAll('.tile.expired').length;

    kpiRow.innerHTML =
      mkCard('⚡',allRecords.filter(r=>!r.record.Status?.toLowerCase().includes('completed')).length,'Active Requests')+
      mkCard('📦',totalPackages,'Total Packages')+
      mkCard('⚠️',closeToExpiry,'Packages Close to Expiry')+
      mkCard('❌',expired,'Expired Packages')+
      mkCard('✅',allRecords.filter(r=>r.record.Status?.toLowerCase().includes('completed')).length,'Completed Requests')+
      mkCard('🟢',allRecords.length,'Total Requests');

    document.getElementById('spinner').style.display='none';
  }catch(e){
    console.error('Dashboard error →',e);
    const sp = document.getElementById('spinner');
    sp.textContent='❌ Unable to load data – see console for details.';
    sp.style.display='block';
  }
})();

/* ====================== UI HELPER (header / KPI height) ====================== */
function setWrapperHeights(){
  const h = document.querySelector('.dash-header');
  const k = document.getElementById('kpi-row');
  if(h && k){
    const r=document.documentElement;
    r.style.setProperty('--header-h',`${h.offsetHeight}px`);
    r.style.setProperty('--kpi-h',`${k.offsetHeight}px`);
  }
}
window.addEventListener('load',setWrapperHeights);
window.addEventListener('resize',setWrapperHeights);
