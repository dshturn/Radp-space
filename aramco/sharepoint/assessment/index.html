<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assessment LoR - Aramco RADP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #0f172a;
      --bg-1: #1e293b;
      --bg-2: #334155;
      --bg-3: #475569;
      --text-0: #f1f5f9;
      --text-1: #cbd5e1;
      --text-2: #94a3b8;
      --text-3: #64748b;
      --text-4: #475569;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #10b981;
      --error: #ef4444;
      --warn: #f59e0b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background-color: var(--bg-0);
      color: var(--text-0);
      line-height: 1.6;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    header {
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--bg-3);
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .header-subtitle {
      color: var(--text-2);
      font-size: 14px;
    }

    .search-section {
      background-color: var(--bg-1);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 32px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .form-group {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="number"] {
      padding: 10px 12px;
      background-color: var(--bg-2);
      border: 1px solid var(--bg-3);
      border-radius: 6px;
      color: var(--text-0);
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: var(--accent);
      background-color: var(--bg-2);
    }

    .button-group {
      display: flex;
      gap: 8px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-family: 'Barlow', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .btn-primary {
      background-color: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background-color: var(--accent-hover);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-secondary {
      background-color: var(--bg-2);
      color: var(--text-0);
      border: 1px solid var(--bg-3);
    }

    .btn-secondary:hover {
      background-color: var(--bg-3);
    }

    .btn-secondary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      font-size: 11px;
      padding: 3px 6px;
      border-radius: 3px;
      font-weight: 600;
    }

    .status-valid {
      background-color: rgba(16, 185, 129, 0.2);
      color: var(--success);
    }

    .status-expiring {
      background-color: rgba(245, 158, 11, 0.2);
      color: var(--warn);
    }

    .status-expired {
      background-color: rgba(239, 68, 68, 0.2);
      color: var(--error);
    }

    .lor-container {
      display: none;
    }

    .lor-container.active {
      display: block;
    }

    .lor-header {
      background-color: var(--bg-1);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 24px;
      border-left: 4px solid var(--accent);
    }

    .lor-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .lor-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      font-size: 13px;
      color: var(--text-2);
    }

    .meta-item {
      display: flex;
      flex-direction: column;
    }

    .meta-label {
      font-weight: 600;
      color: var(--text-1);
      margin-bottom: 4px;
    }

    .section {
      margin-bottom: 32px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--bg-2);
      color: var(--accent);
    }

    .tree-container {
      background-color: var(--bg-1);
      border-radius: 8px;
      border: 1px solid var(--bg-2);
      overflow: hidden;
    }

    .tree-item {
      border-bottom: 1px solid var(--bg-2);
    }

    .tree-item:last-child {
      border-bottom: none;
    }

    .tree-item-header {
      padding: 12px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      background-color: var(--bg-1);
      transition: background-color 0.2s;
      user-select: none;
    }

    .tree-item-header:hover {
      background-color: var(--bg-2);
    }

    .tree-toggle {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-size: 12px;
      font-weight: bold;
    }

    .tree-toggle.collapsed::before {
      content: "▶";
    }

    .tree-toggle.expanded::before {
      content: "▼";
    }

    .tree-item-content {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .tree-item-main {
      flex: 1;
    }

    .tree-item-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--text-0);
    }

    .tree-item-meta {
      font-size: 12px;
      color: var(--text-3);
      margin-top: 2px;
    }

    .tree-children {
      background-color: var(--bg-2);
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .tree-children.expanded {
      max-height: 2000px;
    }

    .tree-child-item {
      padding: 10px 16px 10px 50px;
      border-bottom: 1px solid var(--bg-3);
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .tree-child-item:last-child {
      border-bottom: none;
    }

    .tree-child-icon {
      margin-top: 2px;
      color: var(--accent);
      font-size: 12px;
    }

    .tree-child-content {
      flex: 1;
    }

    .tree-child-name {
      font-size: 12px;
      color: var(--text-1);
      font-weight: 500;
    }

    .tree-child-dates {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 2px;
    }

    .tree-child-dates span {
      display: inline-block;
      margin-right: 12px;
    }

    .doc-link {
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
      font-weight: 500;
      margin-left: 8px;
      white-space: nowrap;
    }

    .doc-link:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    .empty {
      background-color: var(--bg-1);
      padding: 32px;
      border-radius: 8px;
      text-align: center;
      color: var(--text-3);
    }

    .loading {
      text-align: center;
      padding: 32px;
      color: var(--text-2);
    }

    .spinner {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid var(--bg-2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error {
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid var(--error);
      color: var(--error);
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 13px;
    }

    .success {
      background-color: rgba(16, 185, 129, 0.1);
      border: 1px solid var(--success);
      color: var(--success);
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 13px;
    }

    .document-viewer {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.8);
      z-index: 1000;
    }

    .document-viewer.open {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .viewer-container {
      background-color: var(--bg-0);
      border-radius: 8px;
      width: 90%;
      max-width: 900px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .viewer-header {
      background-color: var(--bg-1);
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--bg-2);
    }

    .viewer-title {
      font-weight: 600;
      font-size: 14px;
    }

    .viewer-body {
      flex: 1;
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .viewer-body img,
    .viewer-body iframe {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .close-btn {
      background-color: transparent;
      color: var(--text-0);
      padding: 8px;
      font-size: 20px;
      cursor: pointer;
    }

    .close-btn:hover {
      color: var(--error);
    }

    .print-section {
      margin-top: 24px;
      text-align: right;
    }

    @media print {
      .search-section,
      .print-section,
      .document-viewer {
        display: none;
      }

      body {
        background-color: white;
        color: black;
      }

      .tree-container,
      .tree-item-header,
      .tree-children {
        background-color: white;
        color: black;
        border-color: #ccc;
      }

      .section-title {
        color: #000;
        border-color: #ccc;
      }

      .tree-children.expanded {
        max-height: none;
      }

      .doc-link {
        color: #0066cc;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- MAIN CONTENT -->
    <div id="contentContainer">
      <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; padding-bottom: 16px; border-bottom: 1px solid var(--bg-3);">
        <div>
          <h1>Assessment Letter of Responsibility</h1>
          <p class="header-subtitle">RADP Assessment Review Module</p>
        </div>
        <div style="text-align: right; display: flex; align-items: center; gap: 16px;">
          <div id="assessorInput" style="display: flex; gap: 8px; align-items: center;">
            <input
              type="text"
              id="assessorName"
              placeholder="Your name"
              style="padding: 6px 12px; background-color: var(--bg-2); border: 1px solid var(--bg-3); border-radius: 4px; color: var(--text-0); font-family: 'Barlow', sans-serif; font-size: 12px; width: 150px;"
            />
            <button class="btn-secondary" onclick="setAssessorName(event)" style="padding: 6px 12px; font-size: 12px;">Set</button>
          </div>
          <div style="font-size: 12px; color: var(--text-2);">Assessor: <span id="currentUser" style="font-weight: 600; color: var(--text-0);">Assessor</span></div>
          <button class="btn-secondary" onclick="handleLogout()" style="padding: 6px 12px; font-size: 12px;">Reset</button>
        </div>
      </header>

      <div class="search-section">
      <div class="form-group">
        <label for="assessmentId">Assessment ID</label>
        <input
          type="number"
          id="assessmentId"
          placeholder="Enter RADP assessment ID"
          min="1"
        >
      </div>
      <div class="button-group">
        <button class="btn-primary" id="fetchBtn" onclick="fetchAssessment()">
          📋 Fetch LoR
        </button>
      </div>
    </div>

    <div id="messageContainer"></div>

    <div id="lorContainer" class="lor-container">
      <div class="lor-header">
        <div class="lor-title">Assessment #<span id="assessmentIdDisplay"></span></div>
        <div class="lor-meta">
          <div class="meta-item">
            <span class="meta-label">Field/Well</span>
            <span id="fieldWell">—</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Type of Job</span>
            <span id="jobType">—</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Objective</span>
            <span id="objective">—</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Status</span>
            <span id="assessmentStatus"></span>
          </div>
        </div>
      </div>

      <!-- Personnel Section -->
      <div class="section">
        <h2 class="section-title">👥 Personnel</h2>
        <div id="personnelTree" class="tree-container"></div>
      </div>

      <!-- Equipment Section -->
      <div class="section">
        <h2 class="section-title">⚙️ Equipment</h2>
        <div id="equipmentTree" class="tree-container"></div>
      </div>

      <div class="print-section">
        <button class="btn-secondary" onclick="window.print()">
          🖨️ Print LoR
        </button>
      </div>
    </div>
  </div>

  <!-- Document Viewer Modal -->
  <div id="documentViewer" class="document-viewer">
    <div class="viewer-container">
      <div class="viewer-header">
        <div class="viewer-title" id="viewerTitle">Document</div>
        <button class="close-btn" onclick="closeViewer()">✕</button>
      </div>
      <div class="viewer-body" id="viewerBody">
        <div class="loading">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
