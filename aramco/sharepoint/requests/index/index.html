<body>
  <div class="loading-screen" id="loading-screen">
    <div class="skeleton-loading">
      <div class="skeleton-box"></div>
      <div class="skeleton-box"></div>
      <div class="skeleton-box"></div>
    </div>
    <p>Loading...</p>
    <div id="progress-bar" style="width: 0%; height: 30px; background-color: green; border: 1px solid black;"></div>
  </div>
  <div class="container" id="container">
    <div class="menu" id="menu">
    </div>
    <div class="results" id="results">
      <h2 id="results-title" style="display: inline-block; margin: 0 0 0 0; position: relative; top: 5px;">Active Requests</h2>
      <button id="refresh-button" style="margin: 0 0 10px 10px;">Refresh</button>    
      <table class="active-requests-table" id="active-requests-table">
        <thead>
          <tr>
            <th>Title</th>
            <th>Division</th>
            <th>Current Status</th>
            <th>Step Duration</th>
            <th>Request Duration</th>
          </tr>
        </thead>
        <tbody id="active-requests-tbody">
        </tbody>
      </table>

      <table class="completed-requests-table" id="completed-requests-table" style="display: none;">
        <thead>
          <tr>
            <th>Title</th>
            <th>Division</th>
            <th>Status</th>
            <th>Request Duration</th>
          </tr>
        </thead>
        <tbody id="completed-requests-tbody">
        </tbody>
      </table>

      <table class="onwcod-requests-table" id="onwcod-requests-table" style="display: none;">
        <thead>
          <tr>
            <th>Title</th>
            <th>Division</th>
            <th>Status</th>
            <th>Request Duration</th>
          </tr>
        </thead>
        <tbody id="onwcod-requests-tbody">
        </tbody>
      </table>

      <table class="offwcodwsd-requests-table" id="offwcodwsd-requests-table" style="display: none;">
        <thead>
          <tr>
            <th>Title</th>
            <th>Division</th>
            <th>Status</th>
            <th>Request Duration</th>
          </tr>
        </thead>
        <tbody id="offwcodwsd-requests-tbody">
        </tbody>
      </table>

      <table class="onwsd-requests-table" id="onwsd-requests-table" style="display: none;">
        <thead>
          <tr>
            <th>Title</th>
            <th>Division</th>
            <th>Status</th>
            <th>Request Duration</th>
          </tr>
        </thead>
        <tbody id="onwsd-requests-tbody">
        </tbody>
      </table>
  </div>
  </div>
  <div id="dialogue-window-1">
    <div id="dialogue-content-1">
      <h2 id="dialogue-title"></h2>
      <p id="dialogue-version"></p>
      <p id="dialogue-modified-by"></p>
      <p id="dialogue-modified-date"></p>
    </div>
    <button id="dialogue-close-1">Close</button>
  </div>
  <div id="dialogue-window-2">
    <div id="dialogue-content-2">
      <h2 id="change-dialogue-title"></h2>
      <p id="change-dialogue-version"></p>
      <p id="change-dialogue-modified-by"></p>
      <p id="change-dialogue-modified-date"></p>
      <div class="form-group">
        <label>Current Request:</label>
        <select id="requestSelect"></select>
      </div>
      <div class="form-group">
        <label>Current Status:</label>
        <input type="text" id="currentStatus" readonly>
      </div>
      <div class="form-group">
        <label>New Status:</label>
        <select id="newStatusSelect"></select>
      </div>
      <button id="submitBtn">Submit Changes</button>
    </div>
    <button id="dialogue-close-2">Close</button>
  </div>
