  function createEmailWithAttachment() {
    var email = "user@example.com";
    var subject = "Email with Attachment";
    var body = "Please find the attached file.";
    var attachment = "C:\Users\shturndx\Downloads\SLB.pdf";

    var mailtoLink = "ms-outlook:compose?to=" + email + "&subject=" + encodeURIComponent(subject) + "&body=" + encodeURIComponent(body) + "&attachment=" + encodeURIComponent(attachment);

    window.location.href = mailtoLink;
  }
