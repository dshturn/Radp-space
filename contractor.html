<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RADP - Contractor Portal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    .header { background: #1e293b; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .header h1 { color: #38bdf8; font-size: 18px; }
    .header .info { font-size: 13px; color: #94a3b8; }
    .header button { background: #334155; color: #e2e8f0; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
    .container { padding: 24px; max-width: 900px; margin: 0 auto; }
    .welcome { background: #1e293b; border-radius: 10px; padding: 20px; margin-bottom: 24px; }
    .welcome h2 { font-size: 16px; margin-bottom: 6px; }
    .welcome p { font-size: 13px; color: #94a3b8; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab { padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; border: none; background: #1e293b; color: #94a3b8; }
    .tab.active { background: #0284c7; color: white; }
    .section { display: none; }
    .section.active { display: block; }
    .card { background: #1e293b; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .card-title { font-size: 15px; font-weight: bold; }
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
    .badge.valid { background: #064e3b; color: #6ee7b7; }
    .badge.expired { background: #4c0519; color: #fda4af; }
    .badge.pending { background: #422006; color: #fbbf24; }
    .badge.mandatory { background: #1e3a5f; color: #93c5fd; }
    .badge.optional { background: #2d1b69; color: #c4b5fd; }
    .doc-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #334155; flex-wrap: wrap; gap: 8px; }
    .doc-row:last-child { border-bottom: none; }
    .doc-name { font-size: 13px; color: #94a3b8; }
    .doc-date { font-size: 12px; color: #64748b; }
    .upload-btn { background: #0284c7; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .add-btn { background: #059669; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; margin-bottom: 16px; }
    .empty { color: #475569; text-align: center; padding: 32px; }
    .sn-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .sn-row input { flex: 1; min-width: 120px; padding: 8px 12px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 13px; }
    .sn-row button { background: #0284c7; color: white; border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
    .modal.open { display: flex; }
    .modal-box { background: #1e293b; padding: 24px; border-radius: 12px; width: 90%; max-width: 400px; }
    .modal-box h3 { color: #38bdf8; margin-bottom: 16px; }
    .modal-box input { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 14px; margin-bottom: 12px; }
    .modal-btns { display: flex; gap: 8px; }
    .modal-btns button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .btn-save { background: #0284c7; color: white; }
    .btn-cancel { background: #334155; color: #e2e8f0; }
    input[type="file"] { display: none; }
    .section-label { font-size: 12px; color: #64748b; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
    .sn-info { font-size: 13px; color: #94a3b8; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="header">
  <h1>RADP Contractor Portal</h1>
  <div class="info" id="userInfo"></div>
  <button onclick="logout()">Logout</button>
</div>

<div class="container">
  <div class="welcome">
    <h2 id="welcomeMsg">Welcome</h2>
    <p id="companyInfo"></p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('equipment', this)">Equipment</button>
    <button class="tab" onclick="showTab('personnel', this)">Personnel</button>
  </div>

  <div id="equipment" class="section active">
    <div class="section-label">Mandatory Equipment</div>
    <div id="mandatoryList"><div class="empty">Loading...</div></div>
    <div class="section-label" style="margin-top:20px">Additional Equipment</div>
    <button class="add-btn" onclick="openAddEquipment()">+ Add Equipment</button>
    <div id="additionalList"></div>
  </div>

  <div id="personnel" class="section">
    <button class="add-btn" onclick="openAddPersonnel()">+ Add Personnel</button>
    <div id="personnelList"><div class="empty">Loading...</div></div>
  </div>
</div>

<div class="modal" id="equipModal">
  <div class="modal-box">
    <h3>Add Equipment</h3>
    <input type="text" id="equipName" placeholder="Equipment name">
    <input type="text" id="equipSerial" placeholder="Serial number">
    <input type="text" id="equipModel" placeholder="Model (optional)">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('equipModal')">Cancel</button>
      <button class="btn-save" onclick="addEquipment()">Save</button>
    </div>
  </div>
</div>

<div class="modal" id="personnelModal">
  <div class="modal-box">
    <h3>Add Personnel</h3>
    <input type="text" id="persName" placeholder="Full name">
    <input type="text" id="persPosition" placeholder="Position / Role">
    <input type="text" id="persCert" placeholder="Certificate number">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('personnelModal')">Cancel</button>
      <button class="btn-save" onclick="addPersonnel()">Save</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png">

<script>
  const SUPABASE_URL = 'https://fslleuedqlxpjnerruzt.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_O_f8pz1TnglyqJlO6z2EEA_J3EcJbwV';

  const token = localStorage.getItem('radp_token');
  const user = JSON.parse(localStorage.getItem('radp_user') || '{}');
  if (!token) window.location.href = '/login.html';

  document.getElementById('userInfo').textContent = user.email || '';
  document.getElementById('welcomeMsg').textContent = `Welcome, ${user.full_name || 'Contractor'}`;
  document.getElementById('companyInfo').textContent = `${user.company || ''} · ${user.service_line || ''}`;

  const headers = { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' };

  let currentUploadItemId = null;
  let currentUploadDocTypeId = null;
  let currentUploadType = null;

  function showTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    document.getElementById(tab).classList.add('active');
  }

  function logout() {
    localStorage.removeItem('radp_token');
    localStorage.removeItem('radp_user');
    window.location.href = '/login.html';
  }

  function openAddEquipment() { document.getElementById('equipModal').classList.add('open'); }
  function openAddPersonnel() { document.getElementById('personnelModal').classList.add('open'); }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  async function loadEquipment() {
    const tmplRes = await fetch(`${SUPABASE_URL}/rest/v1/equipment_templates?service_line=eq.${encodeURIComponent(user.service_line)}&order=name`, { headers });
    const templates = await tmplRes.json();

    const itemsRes = await fetch(`${SUPABASE_URL}/rest/v1/equipment_items?contractor_id=eq.${user.id}&select=*`, { headers });
    const items = await itemsRes.json();

    const itemsByTemplate = {};
    items.forEach(i => { itemsByTemplate[i.equipment_template_id] = i; });

    const tmplIds = templates.map(t => t.id).join(',');
    let allDocTypes = [];
    if (tmplIds) {
      const dtRes = await fetch(`${SUPABASE_URL}/rest/v1/document_types?equipment_template_id=in.(${tmplIds})&select=*`, { headers });
      allDocTypes = await dtRes.json();
    }

    const itemIds = items.map(i => i.id).join(',');
    let uploadedDocs = [];
    if (itemIds) {
      const docsRes = await fetch(`${SUPABASE_URL}/rest/v1/documents?equipment_item_id=in.(${itemIds})&select=*`, { headers });
      uploadedDocs = await docsRes.json();
    }

    const docsByItem = {};
    uploadedDocs.forEach(d => {
      if (!docsByItem[d.equipment_item_id]) docsByItem[d.equipment_item_id] = [];
      docsByItem[d.equipment_item_id].push(d);
    });

    const mandatory = templates.filter(t => t.is_mandatory);
    document.getElementById('mandatoryList').innerHTML = mandatory.length ? mandatory.map(t => {
      const item = itemsByTemplate[t.id];
      const docTypes = allDocTypes.filter(dt => dt.equipment_template_id === t.id);
      const docs = item ? (docsByItem[item.id] || []) : [];
      return equipCard(t, item, true, docTypes, docs);
    }).join('') : '<div class="empty">No mandatory equipment defined</div>';

    const additional = items.filter(i => !i.equipment_template_id);
    document.getElementById('additionalList').innerHTML = additional.length ? additional.map(i => customEquipCard(i)).join('') : '';
  }

  function equipCard(template, item, mandatory, docTypes, docs) {
    const badge = mandatory ? '<span class="badge mandatory">Required</span>' : '<span class="badge optional">Optional</span>';
    if (item) {
      const docsHtml = docTypes.map(dt => {
        const uploaded = docs.find(d => d.document_type_id === dt.id);
        const status = uploaded ? (uploaded.ai_status || 'pending') : 'missing';
        const statusColors = { valid: '#6ee7b7', expired: '#fda4af', missing: '#94a3b8', pending: '#fbbf24' };
        const color = statusColors[status] || '#fbbf24';
        const dateInfo = uploaded ? `Issue: ${uploaded.issue_date || '—'} · Expiry: ${uploaded.expiry_date || '—'}` : 'Not uploaded';
        return `<div class="doc-row">
          <div style="flex:1">
            <div class="doc-name">${dt.document_name}</div>
            <div class="doc-date">${dateInfo}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span style="color:${color};font-size:11px;font-weight:bold">${status.toUpperCase()}</span>
            <button class="upload-btn" onclick="uploadEquipDoc('${item.id}', '${dt.id}')">↑ Upload</button>
          </div>
        </div>`;
      }).join('');

      return `<div class="card">
        <div class="card-header">
          <div class="card-title">${template.name}</div>
          ${badge}
        </div>
        <div class="sn-info">S/N: ${item.serial_number || '—'} · Model: ${item.model || '—'}</div>
        ${docsHtml || '<div class="doc-name">No document types defined</div>'}
      </div>`;
    } else {
      return `<div class="card">
        <div class="card-header">
          <div class="card-title">${template.name}</div>
          ${badge}
        </div>
        <div class="sn-row">
          <input type="text" placeholder="Serial number" id="sn_${template.id}">
          <input type="text" placeholder="Model" id="model_${template.id}">
          <button onclick="saveSerialNumber('${template.id}')">Save</button>
        </div>
      </div>`;
    }
  }

  function customEquipCard(item) {
    return `<div class="card">
      <div class="card-header">
        <div class="card-title">${item.model || 'Custom Equipment'}</div>
        <span class="badge optional">Additional</span>
      </div>
      <div class="sn-info">S/N: ${item.serial_number || '—'}</div>
      <button class="upload-btn" style="margin-top:10px" onclick="uploadEquipDoc('${item.id}', null)">↑ Upload Document</button>
    </div>`;
  }

  async function saveSerialNumber(templateId) {
    const sn = document.getElementById(`sn_${templateId}`).value;
    const model = document.getElementById(`model_${templateId}`).value;
    if (!sn) { alert('Please enter serial number'); return; }
    await fetch(`${SUPABASE_URL}/rest/v1/equipment_items`, {
      method: 'POST',
      headers: { ...headers, Prefer: 'return=minimal' },
      body: JSON.stringify({ contractor_id: user.id, equipment_template_id: parseInt(templateId), serial_number: sn, model })
    });
    loadEquipment();
  }

  async function addEquipment() {
    const name = document.getElementById('equipName').value;
    const serial = document.getElementById('equipSerial').value;
    const model = document.getElementById('equipModel').value;
    if (!name || !serial) { alert('Please fill name and serial number'); return; }
    await fetch(`${SUPABASE_URL}/rest/v1/equipment_items`, {
      method: 'POST',
      headers: { ...headers, Prefer: 'return=minimal' },
      body: JSON.stringify({ contractor_id: user.id, serial_number: serial, model: name })
    });
    closeModal('equipModal');
    loadEquipment();
  }

  async function addPersonnel() {
    const name = document.getElementById('persName').value;
    const position = document.getElementById('persPosition').value;
    const cert = document.getElementById('persCert').value;
    if (!name) { alert('Please enter full name'); return; }
    await fetch(`${SUPABASE_URL}/rest/v1/personnel`, {
      method: 'POST',
      headers: { ...headers, Prefer: 'return=minimal' },
      body: JSON.stringify({ contractor_id: user.id, full_name: name, position, certificate_number: cert })
    });
    closeModal('personnelModal');
    loadPersonnel();
  }

  async function loadPersonnel() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/personnel?contractor_id=eq.${user.id}&select=*`, { headers });
    const people = await res.json();
    const list = document.getElementById('personnelList');
    if (!people.length) { list.innerHTML = '<div class="empty">No personnel added yet</div>'; return; }
    list.innerHTML = people.map(p => `
      <div class="card">
        <div class="card-header">
          <div class="card-title">${p.full_name}</div>
          <span class="badge ${p.ai_status || 'pending'}">${p.ai_status || 'pending'}</span>
        </div>
        <div class="doc-name">${p.position || ''} · Cert: ${p.certificate_number || '—'}</div>
        <div class="doc-date" style="margin-top:6px">Issue: ${p.issue_date || '—'} · Expiry: ${p.expiry_date || 'Not set'}</div>
        <button class="upload-btn" style="margin-top:10px" onclick="uploadPersonnelDoc('${p.id}')">↑ Upload Certificate</button>
      </div>`).join('');
  }

  function uploadEquipDoc(itemId, docTypeId) {
    currentUploadItemId = itemId;
    currentUploadDocTypeId = docTypeId;
    currentUploadType = 'equipment';
    document.getElementById('fileInput').click();
  }

  function uploadPersonnelDoc(personId) {
    currentUploadItemId = personId;
    currentUploadDocTypeId = null;
    currentUploadType = 'personnel';
    document.getElementById('fileInput').click();
  }

  document.getElementById('fileInput').onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const bucket = currentUploadType === 'equipment' ? 'equipment-docs' : 'personnel-docs';
    const path = `${currentUploadType}/${user.id}/${currentUploadItemId}/${Date.now()}_${file.name}`;
    const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/${bucket}/${path}`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': file.type },
      body: file
    });
    if (uploadRes.ok) {
      const fileUrl = `${SUPABASE_URL}/storage/v1/object/public/${bucket}/${path}`;
      if (currentUploadType === 'equipment') {
        await fetch(`${SUPABASE_URL}/rest/v1/documents`, {
          method: 'POST',
          headers: { ...headers, Prefer: 'return=minimal' },
          body: JSON.stringify({
            equipment_item_id: parseInt(currentUploadItemId),
            document_type_id: currentUploadDocTypeId ? parseInt(currentUploadDocTypeId) : null,
            file_url: fileUrl,
            ai_status: 'pending'
          })
        });
      } else {
        await fetch(`${SUPABASE_URL}/rest/v1/personnel?id=eq.${currentUploadItemId}`, {
          method: 'PATCH',
          headers: { ...headers, Prefer: 'return=minimal' },
          body: JSON.stringify({ file_url: fileUrl, ai_status: 'pending' })
        });
      }
      alert('File uploaded successfully!');
      currentUploadType === 'equipment' ? loadEquipment() : loadPersonnel();
    } else {
      alert('Upload failed. Please try again.');
    }
    e.target.value = '';
  };

  loadEquipment();
  loadPersonnel();
</script>
</body>
</html>
