<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RADP - Contractor Portal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    nav { background: #1e293b; border-bottom: 1px solid #334155; padding: 10px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
    .nav-links { display: flex; gap: 16px; flex-wrap: wrap; }
    nav a { color: #94a3b8; font-size: 13px; text-decoration: none; }
    nav a:hover { color: #38bdf8; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-user { font-size: 13px; color: #64748b; }
    .nav-logout { background: #334155; color: #e2e8f0; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .nav-logout:hover { background: #475569; }
    .container { padding: 24px; max-width: 900px; margin: 0 auto; }
    .welcome { background: #1e293b; border-radius: 10px; padding: 20px; margin-bottom: 24px; }
    .welcome h2 { font-size: 16px; margin-bottom: 6px; }
    .welcome p { font-size: 13px; color: #94a3b8; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab { padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; border: none; background: #1e293b; color: #94a3b8; }
    .tab.active { background: #0284c7; color: white; }
    .section { display: none; }
    .section.active { display: block; }
    .card { background: #1e293b; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .card-title { font-size: 15px; font-weight: bold; }
    .badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
    .badge.valid { background: #064e3b; color: #6ee7b7; }
    .badge.expired { background: #4c0519; color: #fda4af; }
    .badge.pending { background: #422006; color: #fbbf24; }
    .doc-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #334155; flex-wrap: wrap; gap: 8px; }
    .doc-row:last-child { border-bottom: none; }
    .doc-name { font-size: 13px; color: #94a3b8; }
    .doc-date { font-size: 12px; color: #64748b; }
    .upload-btn { background: #0284c7; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .add-btn { background: #059669; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; margin-bottom: 16px; }
    .add-sub-btn { background: #0f172a; color: #38bdf8; border: 1px solid #334155; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    .add-sub-btn:hover { background: #1e3a5f; }
    .empty { color: #475569; text-align: center; padding: 32px; }
    .sn-info { font-size: 13px; color: #94a3b8; margin-bottom: 10px; }
    .subcomponents { margin-top: 14px; border-top: 1px solid #334155; padding-top: 14px; }
    .subcomponents-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .sub-card { background: #0f172a; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
    .sub-card:last-child { margin-bottom: 0; }
    .sub-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 6px; }
    .sub-card-title { font-size: 13px; font-weight: bold; color: #cbd5e1; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
    .modal.open { display: flex; }
    .modal-box { background: #1e293b; padding: 24px; border-radius: 12px; width: 90%; max-width: 400px; }
    .modal-box h3 { color: #38bdf8; margin-bottom: 16px; }
    .modal-box input { width: 100%; padding: 10px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 14px; margin-bottom: 12px; }
    .modal-btns { display: flex; gap: 8px; }
    .modal-btns button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .btn-save { background: #0284c7; color: white; }
    .btn-cancel { background: #334155; color: #e2e8f0; }
    input[type="file"] { display: none; }
  </style>
</head>
<body>

<nav>
  <div class="nav-links" id="navLinks"></div>
  <div class="nav-right">
    <span class="nav-user" id="navUser"></span>
    <button class="nav-logout" onclick="logout()">Logout</button>
  </div>
</nav>
<script>
  (function() {
    const user = JSON.parse(localStorage.getItem('radp_user') || '{}');
    document.getElementById('navLinks').innerHTML = `<a href="/contractor.html">📋 Contractor</a><a href="/assessment.html">📄 Assessments</a>`;
    document.getElementById('navUser').textContent = user.email || '';
  })();
</script>

<div class="container">
  <div class="welcome">
    <h2 id="welcomeMsg">Welcome</h2>
    <p id="companyInfo"></p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('equipment', this)">Equipment</button>
    <button class="tab" onclick="showTab('personnel', this)">Personnel</button>
  </div>

  <div id="equipment" class="section active">
    <button class="add-btn" onclick="openAddEquipment()">+ Add Equipment</button>
    <div id="equipmentList"><div class="empty">Loading...</div></div>
  </div>

  <div id="personnel" class="section">
    <button class="add-btn" onclick="openAddPersonnel()">+ Add Personnel</button>
    <div id="personnelList"><div class="empty">Loading...</div></div>
  </div>
</div>

<!-- Add Equipment Modal -->
<div class="modal" id="equipModal">
  <div class="modal-box">
    <h3>Add Equipment</h3>
    <input type="text" id="equipName" placeholder="Equipment name">
    <input type="text" id="equipSerial" placeholder="Serial number">
    <input type="text" id="equipModel" placeholder="Model (optional)">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('equipModal')">Cancel</button>
      <button class="btn-save" onclick="addEquipment()">Save</button>
    </div>
  </div>
</div>

<!-- Add Sub-component Modal -->
<div class="modal" id="subModal">
  <div class="modal-box">
    <h3 id="subModalTitle">Add Sub-component</h3>
    <input type="text" id="subName" placeholder="Component name (e.g. Gauge, Valve)">
    <input type="text" id="subSerial" placeholder="Serial number">
    <input type="text" id="subModel" placeholder="Model (optional)">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('subModal')">Cancel</button>
      <button class="btn-save" onclick="addSubComponent()">Save</button>
    </div>
  </div>
</div>

<!-- Add Personnel Modal -->
<div class="modal" id="personnelModal">
  <div class="modal-box">
    <h3>Add Personnel</h3>
    <input type="text" id="persName" placeholder="Full name">
    <input type="text" id="persPosition" placeholder="Position / Role">
    <input type="text" id="persCert" placeholder="Certificate number">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('personnelModal')">Cancel</button>
      <button class="btn-save" onclick="addPersonnel()">Save</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png">

<script>
  const SUPABASE_URL = 'https://fslleuedqlxpjnerruzt.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzbGxldWVkcWx4cGpuZXJydXp0Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDk5MzExOSwiZXhwIjoyMDkwNTY5MTE5fQ.oY_dihwgMimesUsvHSuKNoJEXTb3c7vuqWKzeH2pwg4';

  const token = localStorage.getItem('radp_token');
  const user = JSON.parse(localStorage.getItem('radp_user') || '{}');
  if (!token) window.location.href = '/login.html';

  document.getElementById('welcomeMsg').textContent = `Welcome, ${user.full_name || 'Contractor'}`;
  document.getElementById('companyInfo').textContent = `${user.company || ''} · ${user.service_line || ''}`;

  const headers = { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' };

  async function apiFetch(url, options = {}) {
    const res = await fetch(url, options);
    if (res.status === 401) {
      localStorage.removeItem('radp_token');
      localStorage.removeItem('radp_user');
      window.location.href = '/login.html';
      return null;
    }
    const data = await res.json();
    return Array.isArray(data) ? data : [];
  }

  let currentUploadItemId = null;
  let currentUploadType = null;
  let currentSubParentId = null;

  function showTab(tab, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    document.getElementById(tab).classList.add('active');
  }

  function logout() {
    localStorage.removeItem('radp_token');
    localStorage.removeItem('radp_user');
    window.location.href = '/login.html';
  }

  function openAddEquipment() {
    document.getElementById('equipName').value = '';
    document.getElementById('equipSerial').value = '';
    document.getElementById('equipModel').value = '';
    document.getElementById('equipModal').classList.add('open');
  }

  function openAddSubComponent(parentId, parentName) {
    currentSubParentId = parentId;
    document.getElementById('subModalTitle').textContent = `Add Sub-component to ${parentName}`;
    document.getElementById('subName').value = '';
    document.getElementById('subSerial').value = '';
    document.getElementById('subModel').value = '';
    document.getElementById('subModal').classList.add('open');
  }

  function openAddPersonnel() {
    document.getElementById('personnelModal').classList.add('open');
  }

  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  async function loadEquipment() {
    const allItems = await apiFetch(`${SUPABASE_URL}/rest/v1/equipment_items?contractor_id=eq.${user.id}&select=*&order=id`, { headers });
    if (!allItems) return;

    const topLevel = allItems.filter(i => !i.parent_id);
    const subsByParent = {};
    allItems.filter(i => i.parent_id).forEach(i => {
      if (!subsByParent[i.parent_id]) subsByParent[i.parent_id] = [];
      subsByParent[i.parent_id].push(i);
    });

    const allIds = allItems.map(i => i.id).join(',');
    let docs = [];
    if (allIds) {
      docs = await apiFetch(`${SUPABASE_URL}/rest/v1/documents?equipment_item_id=in.(${allIds})&select=*`, { headers }) || [];
    }
    const docsByItem = {};
    docs.forEach(d => {
      if (!docsByItem[d.equipment_item_id]) docsByItem[d.equipment_item_id] = [];
      docsByItem[d.equipment_item_id].push(d);
    });

    const list = document.getElementById('equipmentList');
    if (!topLevel.length) {
      list.innerHTML = '<div class="empty">No equipment added yet</div>';
      return;
    }

    list.innerHTML = topLevel.map(item => {
      const subs = subsByParent[item.id] || [];
      const itemDocs = docsByItem[item.id] || [];
      const subsHtml = subs.map(sub => {
        const subDocs = docsByItem[sub.id] || [];
        return `<div class="sub-card">
          <div class="sub-card-header">
            <div class="sub-card-title">${sub.name || sub.model || 'Sub-component'}</div>
            <button class="upload-btn" onclick="uploadEquipDoc('${sub.id}')">↑ Upload</button>
          </div>
          <div class="sn-info" style="font-size:12px;margin-bottom:6px">S/N: ${sub.serial_number || '—'} · Model: ${sub.model || '—'}</div>
          ${docsHtml(subDocs)}
        </div>`;
      }).join('');

      return `<div class="card">
        <div class="card-header">
          <div class="card-title">${item.name || item.model || 'Equipment'}</div>
          <button class="upload-btn" onclick="uploadEquipDoc('${item.id}')">↑ Upload</button>
        </div>
        <div class="sn-info">S/N: ${item.serial_number || '—'} · Model: ${item.model || '—'}</div>
        ${docsHtml(itemDocs)}
        <div class="subcomponents">
          <div class="subcomponents-label">Sub-components ${subs.length ? `(${subs.length})` : ''}</div>
          ${subsHtml}
          <button class="add-sub-btn" onclick="openAddSubComponent('${item.id}', '${(item.name || item.model || 'Equipment').replace(/'/g, "\\'")}')">+ Add Sub-component</button>
        </div>
      </div>`;
    }).join('');
  }

  function docsHtml(docs) {
    if (!docs.length) return '';
    const statusColors = { valid: '#6ee7b7', expired: '#fda4af', missing: '#94a3b8', pending: '#fbbf24' };
    return docs.map(d => {
      const status = d.ai_status || 'pending';
      const color = statusColors[status] || '#fbbf24';
      return `<div class="doc-row">
        <div style="flex:1">
          <div class="doc-name">${d.original_filename || 'Document'}</div>
          <div class="doc-date">Issue: ${d.issue_date || '—'} · Expiry: ${d.expiry_date || '—'}</div>
        </div>
        <span style="color:${color};font-size:11px;font-weight:bold">${status.toUpperCase()}</span>
      </div>`;
    }).join('');
  }

  async function addEquipment() {
    const name = document.getElementById('equipName').value.trim();
    const serial = document.getElementById('equipSerial').value.trim();
    const model = document.getElementById('equipModel').value.trim();
    if (!name || !serial) { alert('Please fill name and serial number'); return; }
    await fetch(`${SUPABASE_URL}/rest/v1/equipment_items`, {
      method: 'POST',
      headers: { ...headers, Prefer: 'return=minimal' },
      body: JSON.stringify({ contractor_id: user.id, name, serial_number: serial, model: model || null })
    });
    closeModal('equipModal');
    loadEquipment();
  }

  async function addSubComponent() {
    const name = document.getElementById('subName').value.trim();
    const serial = document.getElementById('subSerial').value.trim();
    const model = document.getElementById('subModel').value.trim();
    if (!name || !serial) { alert('Please fill name and serial number'); return; }
    await fetch(`${SUPABASE_URL}/rest/v1/equipment_items`, {
      method: 'POST',
      headers: { ...headers, Prefer: 'return=minimal' },
      body: JSON.stringify({ contractor_id: user.id, name, serial_number: serial, model: model || null, parent_id: currentSubParentId })
    });
    closeModal('subModal');
    loadEquipment();
  }

  async function addPersonnel() {
    const name = document.getElementById('persName').value;
    const position = document.getElementById('persPosition').value;
    const cert = document.getElementById('persCert').value;
    if (!name) { alert('Please enter full name'); return; }
    await fetch(`${SUPABASE_URL}/rest/v1/personnel`, {
      method: 'POST',
      headers: { ...headers, Prefer: 'return=minimal' },
      body: JSON.stringify({ contractor_id: user.id, full_name: name, position, certificate_number: cert })
    });
    closeModal('personnelModal');
    loadPersonnel();
  }

  async function loadPersonnel() {
    const people = await apiFetch(`${SUPABASE_URL}/rest/v1/personnel?contractor_id=eq.${user.id}&select=*`, { headers });
    if (!people) return;
    const list = document.getElementById('personnelList');
    if (!people.length) { list.innerHTML = '<div class="empty">No personnel added yet</div>'; return; }
    list.innerHTML = people.map(p => `
      <div class="card">
        <div class="card-header">
          <div class="card-title">${p.full_name}</div>
          <span class="badge ${p.ai_status || 'pending'}">${p.ai_status || 'pending'}</span>
        </div>
        <div class="doc-name">${p.position || ''} · Cert: ${p.certificate_number || '—'}</div>
        <div class="doc-date" style="margin-top:6px">Issue: ${p.issue_date || '—'} · Expiry: ${p.expiry_date || 'Not set'}</div>
        <button class="upload-btn" style="margin-top:10px" onclick="uploadPersonnelDoc('${p.id}')">↑ Upload Certificate</button>
      </div>`).join('');
  }

  function uploadEquipDoc(itemId) {
    currentUploadItemId = itemId;
    currentUploadType = 'equipment';
    document.getElementById('fileInput').click();
  }

  function uploadPersonnelDoc(personId) {
    currentUploadItemId = personId;
    currentUploadType = 'personnel';
    document.getElementById('fileInput').click();
  }

  document.getElementById('fileInput').onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const bucket = currentUploadType === 'equipment' ? 'equipment-docs' : 'personnel-docs';
    const path = `${currentUploadType}/${user.id}/${currentUploadItemId}/${Date.now()}_${file.name}`;
    const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/${bucket}/${path}`, {
      method: 'POST',
      headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token}`, 'Content-Type': file.type },
      body: file
    });
    if (uploadRes.ok) {
      const fileUrl = `${SUPABASE_URL}/storage/v1/object/public/${bucket}/${path}`;
      if (currentUploadType === 'equipment') {
        await fetch(`${SUPABASE_URL}/rest/v1/documents`, {
          method: 'POST',
          headers: { ...headers, Prefer: 'return=minimal' },
          body: JSON.stringify({
            equipment_item_id: parseInt(currentUploadItemId),
            file_url: fileUrl,
            original_filename: file.name,
            ai_status: 'pending'
          })
        });
      } else {
        await fetch(`${SUPABASE_URL}/rest/v1/personnel?id=eq.${currentUploadItemId}`, {
          method: 'PATCH',
          headers: { ...headers, Prefer: 'return=minimal' },
          body: JSON.stringify({ file_url: fileUrl, ai_status: 'pending' })
        });
      }
      alert('File uploaded successfully!');
      currentUploadType === 'equipment' ? loadEquipment() : loadPersonnel();
    } else {
      alert('Upload failed. Please try again.');
    }
    e.target.value = '';
  };

  loadEquipment();
  loadPersonnel();
</script>
</body>
</html>
